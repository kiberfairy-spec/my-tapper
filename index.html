<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Space Dream</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap');
        * { margin:0; padding:0; box-sizing:border-box; }
        body { background:#000; color:#0f0; font-family:'Press Start 2P',monospace; user-select:none; -webkit-user-select:none; overflow:hidden; height:100dvh; width:100dvw; position:fixed; }
        .stars-layer { position:fixed; top:0; left:0; width:100%; height:100%; pointer-events:none; z-index:0; background:radial-gradient(ellipse at 50% 50%, #010310 0%, #000008 60%, #000 100%); }
        .star { position:absolute; background:#fff; border-radius:50%; animation:twinkle var(--duration) infinite; animation-delay:var(--delay); }
        .star.bright { background:#ccddff; box-shadow:0 0 3px #8899cc; }
        .star.medium { background:#8899bb; }
        .star.dim { background:#556677; }
        .star.tiny { background:#334455; }
        @keyframes twinkle { 0%,100%{opacity:0.1;transform:scale(0.8)} 50%{opacity:0.9;transform:scale(1.3)} }
        @keyframes rotate { from{transform:rotate(0deg)} to{transform:rotate(360deg)} }
        @keyframes slideUp { from{transform:translateY(100%);opacity:0} to{transform:translateY(0);opacity:1} }
        @keyframes lootPopup { 0%{opacity:0;transform:translate(-50%,0)} 20%{opacity:1;transform:translate(-50%,-35px)} 100%{opacity:0;transform:translate(-50%,-90px)} }
        .app-container { position:relative; width:100%; height:100dvh; display:flex; flex-direction:column; }
        .background-map { position:fixed; top:0; left:0; width:100%; height:calc(100dvh - 80px); z-index:1; pointer-events:none; }
        .galaxy-bg { position:relative; width:100%; height:100%; overflow:hidden; background:transparent; }
        .planet-container { position:absolute; top:50%; left:50%; transform:translate(-50%,-50%); z-index:2; }
        .pixel-planet { width:160px; height:100px; position:relative; }
        .player-docked { position:absolute; z-index:10; pointer-events:none; }
        .bg-object { position:absolute; z-index:2; pointer-events:none; transition:opacity 0.3s; transform:translate(-50%,-50%); cursor:pointer; }
        .top-panel { position:fixed; top:0; left:0; right:0; height:50px; display:flex; justify-content:space-between; align-items:center; padding:5px 10px; z-index:100; pointer-events:none; }
        .vip-badge { background:rgba(0,0,0,0.8); border:2px solid #ffaa00; color:#ffaa00; padding:4px 8px; font-size:7px; pointer-events:all; text-align:center; }
        .resources-panel { display:flex; gap:5px; align-items:center; }
        .resource-badge { background:rgba(0,0,0,0.85); border:2px solid #bb9922; color:#bb9922; padding:4px 6px; font-size:7px; pointer-events:all; text-align:center; }
        .fuel-badge { border-color:#4488ff; color:#4488ff; }
        .credits-badge { border-color:#ffcc00; color:#ffcc00; }
        .spice-badge { border-color:#ff66ff; color:#ff66ff; }
        .refuel-btn { background:#4488ff; color:#fff; border:none; padding:4px 8px; font-size:7px; cursor:pointer; font-family:'Press Start 2P',monospace; pointer-events:all; margin-left:5px; display:none; }
        .dev-reset-btn { background:#aa3333; color:#fff; border:none; padding:4px 8px; font-size:7px; cursor:pointer; font-family:'Press Start 2P',monospace; pointer-events:all; margin-left:5px; display:inline-block; }
        .back-btn { width:34px; height:34px; background:rgba(0,20,0,0.9); border:2px solid #00aa44; color:#00dd55; font-size:15px; cursor:pointer; display:none; align-items:center; justify-content:center; font-family:'Press Start 2P',monospace; pointer-events:all; }
        .loot-feed { position:fixed; bottom:85px; left:50%; transform:translateX(-50%); z-index:200; pointer-events:none; display:flex; align-items:center; justify-content:center; gap:6px; flex-wrap:wrap; min-height:26px; }
        .loot-item { font-family:'Press Start 2P',monospace; font-size:7px; color:#ffcc00; background:rgba(0,0,0,0.8); padding:4px 8px; animation:fadeInOut 2.5s ease-in-out forwards; }
        @keyframes fadeInOut { 0%{opacity:0;transform:translateY(10px)} 15%{opacity:1;transform:translateY(0)} 80%{opacity:1;transform:translateY(0)} 100%{opacity:0;transform:translateY(-10px)} }
        .content-overlay { position:fixed; top:50px; left:0; right:0; bottom:80px; z-index:50; pointer-events:none; display:flex; align-items:center; justify-content:center; }
        .content-overlay > * { pointer-events:all; }
        .bottom-panel { position:fixed; bottom:0; left:0; right:0; height:80px; background:rgba(2,2,10,0.96); border-top:2px solid #009944; display:flex; justify-content:space-around; align-items:center; z-index:100; padding:4px; }
        .nav-btn { background:#040c04; border:2px solid #006633; color:#00aa44; padding:5px 8px; font-family:'Press Start 2P',monospace; font-size:6px; cursor:pointer; transition:all 0.2s; text-align:center; flex:1; margin:0 2px; max-width:90px; }
        .nav-btn.active { background:#061806; border-color:#bb9922; }
        .window { background:rgba(2,2,14,0.94); border:2px solid #009944; padding:14px; max-width:320px; width:88%; max-height:55vh; overflow-y:auto; animation:slideUp 0.3s ease-out; }
        .input-field { width:100%; padding:8px; margin:6px 0; background:#040410; border:2px solid #009944; color:#00bb44; font-family:'Press Start 2P',monospace; font-size:8px; text-align:center; }
        .btn { width:100%; padding:8px; margin:5px 0; background:#040c04; border:2px solid #009944; color:#00bb44; font-family:'Press Start 2P',monospace; font-size:8px; cursor:pointer; transition:all 0.2s; }
        .btn:disabled { background:#161616; color:#333; border-color:#333; cursor:not-allowed; }
        .hidden { display:none !important; }
    </style>
</head>
<body>
    <div class="stars-layer" id="stars-layer"></div>
    <div class="app-container">
        <div class="background-map" id="background-map">
            <div class="galaxy-bg" id="galaxy-bg">
                <div class="planet-container" id="planet-container">
                    <div class="pixel-planet" id="pixel-planet"></div>
                </div>
                <div class="player-docked" id="player-docked"></div>
            </div>
        </div>
        <div class="top-panel">
            <div style="display:flex; gap:8px; align-items:center;">
                <button class="back-btn" id="back-btn" onclick="goBack()">←</button>
                <div class="vip-badge" id="vip-badge">⭐ VIP 0</div>
                <button class="dev-reset-btn" id="dev-reset-btn" onclick="devReset()">🔄 СБРОС</button>
            </div>
            <div class="resources-panel">
                <div class="resource-badge credits-badge" id="credits-badge">🪙 <span id="credits-value">0</span></div>
                <div class="resource-badge fuel-badge" id="fuel-badge">⛽ <span id="fuel-value">100</span></div>
                <div class="resource-badge spice-badge" id="spice-badge">💎 <span id="spice-value">0</span></div>
                <button class="refuel-btn" id="refuel-btn" onclick="window.freeRefuel()">БЕСПЛ. ЗАПРАВКА</button>
            </div>
        </div>
        <div class="loot-feed" id="loot-feed"></div>
        <div class="content-overlay" id="content-overlay">
            <!-- Окна без изменений -->
            <div class="window" id="window-start">
                <div class="title">SPACE DREAM</div>
                <input type="text" class="input-field" id="input-player-name" placeholder="ИМЯ ИГРОКА" maxlength="12">
                <button class="btn" onclick="setPlayerName()">ДАЛЕЕ</button>
            </div>
            <div class="window hidden" id="window-faction">
                <div class="title">ВЫБЕРИ ФРАКЦИЮ</div>
                <button class="btn" style="border-color:#4488aa;color:#4488aa" onclick="selectFaction('Конфедерация','#4488aa','tank')">◆ КОНФЕДЕРАЦИЯ<br><small>Защита: 40 | Урон: 20 | Скорость: 15</small></button>
                <button class="btn" style="border-color:#aa5533;color:#aa5533" onclick="selectFaction('Повстанцы','#aa5533','dps')">◆ ПОВСТАНЦЫ<br><small>Защита: 15 | Урон: 25 | Скорость: 35</small></button>
                <button class="btn" style="border-color:#aa9933;color:#aa9933" onclick="selectFaction('Торговая гильдия','#aa9933','sniper')">◆ ТОРГОВАЯ ГИЛЬДИЯ<br><small>Защита: 20 | Урон: 40 | Скорость: 15</small></button>
            </div>
            <div class="window hidden" id="window-ship">
                <div class="title">ВЫБЕРИ КОРАБЛЬ</div>
                <div id="ship-selection" style="display:flex;gap:12px;justify-content:center;margin:10px 0; flex-wrap:wrap;"></div>
                <input type="text" class="input-field" id="input-ship-name" placeholder="ИМЯ КОРАБЛЯ" maxlength="14">
                <button class="btn" id="confirm-ship-btn" onclick="confirmShip()">ПОДТВЕРДИТЬ</button>
            </div>
            <div class="window hidden" id="window-hangar">
                <div class="title">АНГАР</div>
                <div id="hangar-ship-display" style="text-align:center; margin:10px 0;"></div>
                <div id="hangar-resources" style="display:flex;gap:8px;flex-wrap:wrap;justify-content:center;margin:8px 0;font-size:7px;"></div>
                <div id="upgrades-list"></div>
            </div>
            <div class="window hidden" id="window-pvp">
                <div class="title">PvP АРЕНА</div>
                <div style="display:flex; justify-content:space-around; align-items:center; margin:10px 0;">
                    <div id="pvp-player-ship-display"></div>
                    <span style="color:#aa3333;">VS</span>
                    <div id="pvp-enemy-ship-display"></div>
                </div>
                <div style="text-align:center;font-size:8px;color:#aa9933" id="pvp-timer">15</div>
                <div style="text-align:center;font-size:6px" id="pvp-status">Нажмите НАЙТИ БОЙ</div>
                <button class="btn" onclick="searchPvP()">НАЙТИ БОЙ</button>
                <div class="leaderboard" id="leaderboard" style="max-height:120px;overflow-y:auto;font-size:6px;"></div>
            </div>
            <div class="window hidden" id="window-vip">
                <div class="title">VIP СТАТУС</div>
                <p style="font-size:8px;">Уровень: <span id="vip-level">0</span></p>
                <p style="font-size:8px;">Множитель добычи: x<span id="vip-mult">1</span></p>
                <button class="btn" onclick="upgradeVip()">УЛУЧШИТЬ VIP</button>
            </div>
        </div>
        <div class="bottom-panel hidden" id="bottom-panel">
            <button class="nav-btn active" id="nav-map" onclick="switchTab('map')">🌌 КАРТА</button>
            <button class="nav-btn" id="nav-hangar" onclick="switchTab('hangar')">🚀 АНГАР</button>
            <button class="nav-btn" id="nav-pvp" onclick="switchTab('pvp')">⚔️ PvP</button>
            <button class="nav-btn" id="nav-vip" onclick="switchTab('vip')">⭐ VIP</button>
        </div>
    </div>
    <script>
        // ---------- ПЛАНЕТА (увеличена) ----------
        const planetColors = { 1:'#3c1a5b', 2:'#b094fa', 3:'#f25cf2', 4:'#ff9eff', 5:'#e3e8ff' };
        const WIDTH = 64, HEIGHT = 40;
        const planetMatrix = Array(HEIGHT).fill().map(()=>Array(WIDTH).fill(0));
        const centerX=32, centerY=20, radius=14;
        for(let y=0;y<HEIGHT;y++){for(let x=0;x<WIDTH;x++){const dx=x-centerX,dy=y-centerY;if(dx*dx+dy*dy<=radius*radius){planetMatrix[y][x]=2;if((y>=10&&y<=13)||(y>=18&&y<=22)||(y>=27&&y<=29))planetMatrix[y][x]=3;if((y===9&&x===28)||(y===10&&x===29)||(y===21&&x===24))planetMatrix[y][x]=4;}}}
        for(let y=0;y<HEIGHT;y++){for(let x=0;x<WIDTH;x++){const dx=x-centerX,dy=y-centerY;const angle=-20*Math.PI/180;const rx=dx*Math.cos(angle)-dy*Math.sin(angle);const ry=dx*Math.sin(angle)+dy*Math.cos(angle);const inRing=(rx*rx)/(28*28)+(ry*ry)/(5*5)<=1.0;const inInnerHole=(rx*rx)/(18*18)+(ry*ry)/(3.2*3.2)<=1.0;if(inRing&&!inInnerHole){const isFront=ry>0||dx>8;const isPlanetHere=planetMatrix[y][x]!==0;if(!isPlanetHere||isFront){planetMatrix[y][x]=2;if(Math.abs(rx)>24)planetMatrix[y][x]=4;}}}}
        const finalMatrix=JSON.parse(JSON.stringify(planetMatrix));
        for(let y=1;y<HEIGHT-1;y++){for(let x=1;x<WIDTH-1;x++){if(planetMatrix[y][x]===0){if(planetMatrix[y-1][x]>1||planetMatrix[y+1][x]>1||planetMatrix[y][x-1]>1||planetMatrix[y][x+1]>1)finalMatrix[y][x]=1;}}}
        function drawPlanet(ctx,matrix,pixelSize){for(let y=0;y<matrix.length;y++){for(let x=0;x<matrix[0].length;x++){const c=matrix[y][x];if(c){ctx.fillStyle=planetColors[c];ctx.fillRect(x*pixelSize,y*pixelSize,pixelSize,pixelSize);}}}}
        function setupPixelPlanet(){
            const pc=document.querySelector('.pixel-planet');if(!pc)return;pc.innerHTML='';
            const w=document.createElement('div');w.style.cssText='width:100%;height:100%;display:flex;align-items:center;justify-content:center;';
            const ps=2.5; // увеличено с 2
            const canvas=document.createElement('canvas');canvas.width=WIDTH*ps;canvas.height=HEIGHT*ps;
            const ctx=canvas.getContext('2d');ctx.imageSmoothingEnabled=false;canvas.style.imageRendering='pixelated';
            drawPlanet(ctx,finalMatrix,ps);
            canvas.style.cssText='display:block;width:100%;height:100%;image-rendering:pixelated;image-rendering:crisp-edges;';
            w.appendChild(canvas);w.style.animation='rotate 60s linear infinite';pc.appendChild(w);
        }

        // ---------- КОРАБЛИ ----------
        // Палитра для первого корабля (буквенная)
        const PALETTE = { 'A':'#2E0A4E','B':'#5B2C8E','C':'#8B5FBF','P':'#FF44AA','Q':'#44CCFF', 'R':'#8B0000','D':'#2A2A2A','E':'#FF4500','F':'#FF6600','G':'#FFAA00','H':'#FFD700', '_':null };
        // Палитра для НЛО
        const UFO_PALETTE = {
            1:'#14143d', 2:'#346cbd', 3:'#7cb5ec', 4:'#e1f3ff', 5:'#73737c', 6:'#ffffff', 7:'#ff9000'
        };

        // Первый корабль (player1)
        const player1Matrix = [
            "__________A___________","_________AAA__________","_________AAA__________","________AAAAA_________","________AACAA_________","________ACCCA_________","________ACCCA_________","________AAAAA_________","________APBBA_________","________ABBBB_________","________ABBBB_________","_______AABABAA_______","_______ABBABB_______","_______ABBCBA_______","_______ABBCBA_______","_____AAABBABBAAA_____","____ABBABBBBBABB____","___ABBBABBBBBABBBA___","__ABBBBABBBBBABBBB__","_ABBBBBAPBBBPABBBBB_","ABBBBBBAAAAAAABBBBBBA","ABQQBBBABBBBBABBBQQBA","AAAAAAAAABBBBBAAAAAAAAA","_______AAAAAAA_______","________AAAAA_________","_______AAA_AAA_______","_______AAA_AAA_______","________QQ_QQ_________","________QQ_QQ_________","________QB_QB_________","_________Q__Q________","_________Q__Q________"
        ];

        // Генерация НЛО (player2)
        const UFO_W = 52, UFO_H = 34;
        const ufoMatrix = Array(UFO_H).fill().map(()=>Array(UFO_W).fill(0));
        const ufoCenterX = 26, domeCenterY = 22, domeRadius = 20;
        for (let y=0; y<UFO_H; y++) {
            for (let x=0; x<UFO_W; x++) {
                const dx = x - ufoCenterX, dy = y - domeCenterY;
                const distSq = dx*dx + dy*dy;
                if (distSq <= domeRadius*domeRadius && y <= 21) {
                    ufoMatrix[y][x] = 2;
                    if (dx > 4 && distSq > 12*12) ufoMatrix[y][x] = 3;
                    if (dx > 10 && distSq > 17*17) ufoMatrix[y][x] = 4;
                    if (dx < -4 && distSq < 15*15) ufoMatrix[y][x] = 1;
                }
                if (y >= 21 && y <= 24 && Math.abs(dx) <= 24 - (y-21)*2) {
                    ufoMatrix[y][x] = 1;
                    if (y === 22) ufoMatrix[y][x] = 2;
                }
                if (y >= 25 && y <= 26 && Math.abs(dx) <= 16) ufoMatrix[y][x] = 5;
            }
        }
        const lightPositionsX = [10, 18, 26, 34, 42];
        lightPositionsX.forEach(px => {
            if (px>=0 && px<UFO_W) {
                ufoMatrix[22][px] = 6;
                if (ufoMatrix[22][px-1] !== undefined) ufoMatrix[22][px-1] = 7;
                if (ufoMatrix[22][px+1] !== undefined) ufoMatrix[22][px+1] = 7;
                if (ufoMatrix[21] && ufoMatrix[21][px] !== undefined) ufoMatrix[21][px] = 7;
                if (ufoMatrix[23] && ufoMatrix[23][px] !== undefined) ufoMatrix[23][px] = 7;
            }
        });
        for (let y=26; y<34; y++) {
            const step = y-26;
            if (step<6 && Math.abs(ufoCenterX-ufoCenterX)<=2) {
                ufoMatrix[y][ufoCenterX] = 5;
                ufoMatrix[y][ufoCenterX-1] = 1;
                ufoMatrix[y][ufoCenterX+1] = 1;
            }
            const leftX = 14 - step*1.2;
            ufoMatrix[y][Math.round(leftX)] = 5;
            ufoMatrix[y][Math.round(leftX)-1] = 1;
            const rightX = 38 + step*1.2;
            ufoMatrix[y][Math.round(rightX)] = 5;
            ufoMatrix[y][Math.round(rightX)+1] = 1;
        }
        const finalUfoMatrix = JSON.parse(JSON.stringify(ufoMatrix));
        for (let y=1; y<UFO_H-1; y++) {
            for (let x=1; x<UFO_W-1; x++) {
                if (ufoMatrix[y][x] === 0) {
                    if (ufoMatrix[y-1][x] || ufoMatrix[y+1][x] || ufoMatrix[y][x-1] || ufoMatrix[y][x+1]) {
                        finalUfoMatrix[y][x] = 1;
                    }
                }
            }
        }

        const SHIP_SPRITES = {
            player1: player1Matrix,
            player2: finalUfoMatrix, // числовая матрица
            player3: [], // заглушка
            enemy1: [], enemy2: [], enemy3: []
        };

        function drawShipSprite(matrix, scale=1) {
            if (!matrix || matrix.length === 0) {
                const s = document.createElement('span'); s.style.fontSize='30px'; s.innerText='🚀'; return s;
            }
            const rows = matrix.length, cols = matrix[0].length;
            const tileSize = Math.max(2, Math.round(6 * scale));
            const canvas = document.createElement('canvas');
            canvas.width = cols * tileSize;
            canvas.height = rows * tileSize;
            const ctx = canvas.getContext('2d');
            ctx.imageSmoothingEnabled = false;
            canvas.style.imageRendering = 'pixelated';
            canvas.style.imageRendering = 'crisp-edges';

            // Определяем тип матрицы: если первый элемент строка или число
            const isNumeric = typeof matrix[0][0] === 'number';

            for (let y = 0; y < rows; y++) {
                for (let x = 0; x < cols; x++) {
                    const key = matrix[y][x];
                    if (key === '_' || key === 0 || key === undefined) continue;
                    let color;
                    if (isNumeric) {
                        color = UFO_PALETTE[key] || '#888';
                    } else {
                        color = PALETTE[key] || '#888';
                    }
                    ctx.fillStyle = color;
                    ctx.fillRect(x * tileSize, y * tileSize, tileSize, tileSize);
                }
            }
            const wrapper = document.createElement('div');
            wrapper.style.display = 'inline-block';
            wrapper.style.pointerEvents = 'none';
            wrapper.style.imageRendering = 'pixelated';
            wrapper.appendChild(canvas);
            return wrapper;
        }

        window.createPlayerShip = (scale=1) => {
            const index = (window.selectedShipIndex || 0) + 1;
            const matrix = SHIP_SPRITES[`player${index}`];
            return drawShipSprite(matrix, scale);
        };
        window.createEnemyShip=(variant=0)=>{const type=`enemy${(variant%3)+1}`;const m=SHIP_SPRITES[type];if(m&&m.length>0)return drawShipSprite(m,0.8);const s=document.createElement('span');s.style.fontSize='30px';s.innerText='👾';return s;};
        window.createAsteroidEmoji=()=>'🪨'; window.createWreckEmoji=()=>{const w=document.createElement('span');w.style.fontSize='30px';w.innerText='🛸';w.style.filter='grayscale(1) brightness(0.5)';return w;};

        // ---------- БАЗОВЫЕ СТАТЫ ФРАКЦИЙ ----------
        const FACTION_STATS = {
            tank:   { shield:40, damage:20, speed:15 },
            dps:    { shield:15, damage:25, speed:35 },
            sniper: { shield:20, damage:40, speed:15 }
        };

        // ---------- СОСТОЯНИЕ ----------
        window.playerName=localStorage.getItem('sd_player_name')||''; window.shipName=localStorage.getItem('sd_ship_name')||'';
        window.frac=localStorage.getItem('sd_frac')||null; window.fracColor=localStorage.getItem('sd_color')||'#00aa44';
        window.fracBonus=localStorage.getItem('sd_bonus')||null; window.selectedShipIndex=parseInt(localStorage.getItem('sd_ship_index'))||0;
        window.resources={ credits:parseInt(localStorage.getItem('sd_credits'))||0, fuel:parseInt(localStorage.getItem('sd_fuel'))||100, shieldParts:parseInt(localStorage.getItem('sd_shieldParts'))||0, weaponParts:parseInt(localStorage.getItem('sd_weaponParts'))||0, speedParts:parseInt(localStorage.getItem('sd_speedParts'))||0, spice:parseInt(localStorage.getItem('sd_spice'))||0 };
        window.maxFuel=parseInt(localStorage.getItem('sd_maxFuel'))||100; window.freeRefuelUsed=localStorage.getItem('sd_free_refuel')==='true';
        window.upgrades={ damage:parseInt(localStorage.getItem('sd_upg_damage'))||0, shield:parseInt(localStorage.getItem('sd_upg_shield'))||0, speed:parseInt(localStorage.getItem('sd_upg_speed'))||0, luck:parseInt(localStorage.getItem('sd_upg_luck'))||0, fuelTank:parseInt(localStorage.getItem('sd_upg_fuelTank'))||0 };
        window.maxUpgradeLevels={ damage:30, shield:30, speed:30, luck:5, fuelTank:10 };
        window.vipLevel=parseInt(localStorage.getItem('sd_vip'))||0; const vipMultipliers=[1,1.5,3,5,7.5]; window.getMultiplier=()=>vipMultipliers[window.vipLevel]||1;
        window.pvpScore=parseInt(localStorage.getItem('sd_pvp_score'))||0; window.leaderboard=JSON.parse(localStorage.getItem('sd_leaderboard'))||[];
        window.galaxyObjects=[]; window.isShipFlying=false; window.pvpInterval=null; window.pvpTimerInterval=null;
        window.currentTab='map'; window.tempFaction=null; window.tempShipIndex=null;

        window.saveAll=function(){
            Object.keys(window.resources).forEach(k=>localStorage.setItem('sd_'+k,window.resources[k]));
            localStorage.setItem('sd_maxFuel',window.maxFuel); localStorage.setItem('sd_free_refuel',window.freeRefuelUsed);
            localStorage.setItem('sd_vip',window.vipLevel); localStorage.setItem('sd_pvp_score',window.pvpScore);
            localStorage.setItem('sd_leaderboard',JSON.stringify(window.leaderboard));
            localStorage.setItem('sd_player_name',window.playerName); localStorage.setItem('sd_ship_name',window.shipName);
            Object.keys(window.upgrades).forEach(k=>localStorage.setItem('sd_upg_'+k,window.upgrades[k]));
            ['sd_frac','sd_color','sd_bonus','sd_ship_index'].forEach(k=>localStorage.setItem(k,window[k]));
        };

        function updateTopPanel(){
            document.getElementById('vip-badge').innerHTML=`⭐ VIP ${window.vipLevel}`;
            document.getElementById('credits-value').innerText=Math.floor(window.resources.credits);
            document.getElementById('fuel-value').innerText=Math.floor(window.resources.fuel)+'/'+window.maxFuel;
            document.getElementById('spice-value').innerText=window.resources.spice;
            document.getElementById('refuel-btn').style.display=(window.resources.fuel===0&&!window.freeRefuelUsed)?'inline-block':'none';
        }
        window.showLoot=function(name,amount){const feed=document.getElementById('loot-feed');const item=document.createElement('span');item.className='loot-item';item.innerText=`+${amount} ${name}`;feed.appendChild(item);setTimeout(()=>item.remove(),2500);};
        window.showWindow=function(id){document.querySelectorAll('.window').forEach(w=>w.classList.add('hidden'));const win=document.getElementById('window-'+id);if(win)win.classList.remove('hidden');};
        window.showUI=function(){document.getElementById('back-btn').style.display='flex';document.getElementById('bottom-panel').classList.remove('hidden');updateTopPanel();};

        window.devReset = function(){
            if(confirm('СБРОСИТЬ ВЕСЬ ПРОГРЕСС? ЭТО НЕОБРАТИМО.')){
                localStorage.clear();
                location.reload();
            }
        };

        function createBackground(){const layer=document.getElementById('stars-layer');for(let i=0;i<400;i++){const s=document.createElement('div');s.className='star';const r=Math.random();if(r<0.1)s.classList.add('bright');else if(r<0.3)s.classList.add('medium');else if(r<0.6)s.classList.add('dim');else s.classList.add('tiny');s.style.left=Math.random()*100+'%';s.style.top=Math.random()*100+'%';const sz=Math.random()<0.08?2.5:(Math.random()<0.2?1.8:(Math.random()<0.5?1.2:0.6));s.style.width=sz+'px';s.style.height=sz+'px';s.style.setProperty('--duration',(Math.random()*3+1.5)+'s');s.style.setProperty('--delay',Math.random()*2+'s');layer.appendChild(s);}}
        createBackground();

        function getMapCenter(){const bg=document.getElementById('galaxy-bg');return{x:bg.offsetWidth/2,y:bg.offsetHeight/2};}
        function parkShipOnPlanet(){
            const docked = document.getElementById('player-docked');
            if(!docked) return;
            const planet = document.getElementById('planet-container');
            const planetRect = planet.getBoundingClientRect();
            const mapRect = document.getElementById('galaxy-bg').getBoundingClientRect();
            const planetCenterX = planetRect.left - mapRect.left + planetRect.width/2;
            const planetCenterY = planetRect.top - mapRect.top + planetRect.height/2;
            const ship = window.createPlayerShip(0.35); // уменьшено
            docked.innerHTML = '';
            docked.appendChild(ship);
            docked.style.left = (planetCenterX) + 'px';
            docked.style.top = (planetCenterY + 18) + 'px';
            docked.style.transform = 'translate(-50%, -50%)';
            docked.style.display = 'block';
        }

        window.generateObjects=function(){
            const bg=document.getElementById('galaxy-bg');bg.querySelectorAll('.bg-object').forEach(e=>e.remove());window.galaxyObjects=[];
            const center=getMapCenter(); const types=['asteroid','asteroid','asteroid','pirate','pirate','pirate','wreck','wreck','wreck'];
            types.sort(()=>Math.random()-0.5);
            types.forEach(type=>{const angle=Math.random()*Math.PI*2,distance=120+Math.random()*80;const x=center.x+Math.cos(angle)*distance,y=center.y+Math.sin(angle)*distance;const obj={type,x,y,element:null};const div=document.createElement('div');div.className='bg-object';div.style.left=x+'px';div.style.top=y+'px';div.style.pointerEvents='all';if(type==='asteroid')div.innerHTML=window.createAsteroidEmoji();else if(type==='pirate')div.appendChild(window.createEnemyShip(Math.floor(Math.random()*3)));else div.appendChild(window.createWreckEmoji());div.onclick=(e)=>{e.stopPropagation();if(window.currentTab==='map'&&!window.isShipFlying&&window.resources.fuel>=10)window.flyToObject(obj,div);};bg.appendChild(div);obj.element=div;window.galaxyObjects.push(obj);});
        };

        window.generateLoot=function(){
            const mult=window.getMultiplier(); const r=Math.random()*100;
            if(r<55)return null; if(r<75){const amt=Math.floor((Math.random()*91+10)*mult);window.resources.credits+=amt;return{name:'Кредиты',amount:amt};}
            if(r<85){const amt=Math.floor((Math.random()*11+5)*mult);window.resources.fuel=Math.min(window.maxFuel,window.resources.fuel+amt);return{name:'Топливо',amount:amt};}
            if(r<90){const amt=Math.floor((Math.random()*5+1)*mult);window.resources.shieldParts+=amt;return{name:'Щит',amount:amt};}
            if(r<95){const amt=Math.floor((Math.random()*5+1)*mult);window.resources.weaponParts+=amt;return{name:'Оружие',amount:amt};}
            if(r<98){const amt=Math.floor((Math.random()*5+1)*mult);window.resources.speedParts+=amt;return{name:'Скорость',amount:amt};}
            const amt=Math.floor((Math.random()*3+1)*mult);window.resources.spice+=amt;return{name:'Спайс',amount:amt};
        };

        window.flyToObject=function(obj,element){
            if(window.isShipFlying||window.resources.fuel<10)return;
            window.isShipFlying=true;window.resources.fuel-=10;saveAll();updateTopPanel();
            const docked = document.getElementById('player-docked');
            const startX = parseFloat(docked.style.left) || getMapCenter().x;
            const startY = parseFloat(docked.style.top) || getMapCenter().y;
            docked.style.display = 'none';
            const bg=document.getElementById('galaxy-bg');
            const shipEl=window.createPlayerShip(0.45); // уменьшено для полета
            shipEl.style.position='absolute';shipEl.style.left=startX+'px';shipEl.style.top=startY+'px';shipEl.style.transform='translate(-50%,-50%)';shipEl.style.transition='all 5s cubic-bezier(0.25,0.1,0.25,1)';bg.appendChild(shipEl);
            requestAnimationFrame(()=>{shipEl.style.left=obj.x+'px';shipEl.style.top=obj.y+'px';shipEl.style.transform='translate(-50%,-50%) scale(0.8)';});
            setTimeout(()=>{
                const loot=window.generateLoot(); if(loot)window.showLoot(loot.name,loot.amount);
                saveAll();updateTopPanel();
                element.style.opacity='0';setTimeout(()=>element.remove(),300);
                shipEl.style.transition='all 5s cubic-bezier(0.25,0.1,0.25,1)';shipEl.style.left=startX+'px';shipEl.style.top=startY+'px';shipEl.style.transform='translate(-50%,-50%) scale(0.45)';
                setTimeout(()=>{shipEl.remove();window.galaxyObjects=window.galaxyObjects.filter(o=>o!==obj);window.isShipFlying=false;parkShipOnPlanet();if(document.querySelectorAll('.bg-object').length===0)window.generateObjects();},5000);
            },5000);
        };

        setInterval(()=>{if(window.resources.fuel<window.maxFuel){window.resources.fuel=Math.min(window.maxFuel,window.resources.fuel+1);saveAll();updateTopPanel();}},300000);
        window.freeRefuel=function(){if(window.freeRefuelUsed)return;window.resources.fuel=window.maxFuel;window.freeRefuelUsed=true;saveAll();updateTopPanel();};

        function getUpgradeCost(type){
            const lvl=window.upgrades[type];
            if(type==='fuelTank'){const credits=Math.floor(100*Math.pow(2,lvl));const spice=Math.floor(50*Math.pow(1.5,lvl));return{credits,spice,partsType:null,parts:0};}
            else{const partsType=type==='shield'?'shieldParts':(type==='damage'?'weaponParts':(type==='speed'?'speedParts':'shieldParts'));const baseParts=5,baseCredits=50;const parts=Math.floor(baseParts*Math.pow(1.5,lvl));const credits=Math.floor(baseCredits*Math.pow(2,lvl));let spice=0;if(lvl>=14)spice=(lvl===14)?10:Math.floor(10*Math.pow(1.5,lvl-14));return{credits,spice,partsType,parts};}
        }
        function canBuyUpgrade(type){if(window.upgrades[type]>=window.maxUpgradeLevels[type])return false;const cost=getUpgradeCost(type);if(window.resources.credits<cost.credits)return false;if(cost.spice&&window.resources.spice<cost.spice)return false;if(cost.partsType&&window.resources[cost.partsType]<cost.parts)return false;return true;}
        window.buyUpgrade=function(type){if(!canBuyUpgrade(type))return;const cost=getUpgradeCost(type);window.resources.credits-=cost.credits;if(cost.spice)window.resources.spice-=cost.spice;if(cost.partsType)window.resources[cost.partsType]-=cost.parts;window.upgrades[type]++;if(type==='fuelTank'){window.maxFuel+=10;window.resources.fuel=Math.min(window.resources.fuel+10,window.maxFuel);}saveAll();updateHangar();updateTopPanel();};

        function updateHangar(){
            document.getElementById('hangar-resources').innerHTML=`🪙${window.resources.credits} ⛽${Math.floor(window.resources.fuel)}/${window.maxFuel} 🛡️${window.resources.shieldParts} ⚔️${window.resources.weaponParts} ⚡${window.resources.speedParts} 💎${window.resources.spice}`;
            const list=document.getElementById('upgrades-list'); const types=['damage','shield','speed','luck','fuelTank']; const names={damage:'УРОН',shield:'ЗАЩИТА',speed:'СКОРОСТЬ',luck:'УДАЧА',fuelTank:'ТОПЛИВНЫЙ БАК'};
            list.innerHTML=types.map(t=>{const lvl=window.upgrades[t],max=window.maxUpgradeLevels[t];const cost=getUpgradeCost(t);const can=canBuyUpgrade(t);let costStr=`${cost.credits}🪙`;if(cost.spice)costStr+=` ${cost.spice}💎`;if(cost.partsType)costStr+=` ${cost.parts} ${cost.partsType==='shieldParts'?'🛡️':(cost.partsType==='weaponParts'?'⚔️':'⚡')}`;return`<div style="display:flex;justify-content:space-between;padding:4px;border:1px solid #009944;margin:2px 0;"><span>${names[t]} Ур.${lvl}/${max}</span><button class="btn" style="width:auto;padding:2px 6px;" ${can&&lvl<max?'':'disabled'} onclick="buyUpgrade('${t}')">${costStr}</button></div>`;}).join('');
        }

        window.setPlayerName=function(){const n=document.getElementById('input-player-name').value.trim();if(n.length<2)return alert('Минимум 2 символа');window.playerName=n;saveAll();window.showWindow('faction');};
        window.selectFaction=function(name,color,bonus){
            window.tempFaction={name,color,bonus}; const container=document.getElementById('ship-selection');container.innerHTML='';
            for(let i=0;i<3;i++){const card=document.createElement('div');card.style.cssText='cursor:pointer;padding:6px;border:2px solid #009944;text-align:center;width:100px;height:120px;display:flex;align-items:center;justify-content:center;';card.appendChild(drawShipSprite(SHIP_SPRITES[`player${i+1}`], i===0?0.8:0.5));card.onclick=()=>{window.tempShipIndex=i;container.querySelectorAll('div').forEach(d=>d.style.borderColor='#009944');card.style.borderColor='#aa9933';document.getElementById('confirm-ship-btn').disabled=false;};container.appendChild(card);}document.getElementById('confirm-ship-btn').disabled=true;window.showWindow('ship');
        };
        window.confirmShip=function(){
            const name=document.getElementById('input-ship-name').value.trim();if(window.tempShipIndex===null||name.length<2)return alert('Выберите корабль и введите имя');
            window.frac=window.tempFaction.name;window.fracColor=window.tempFaction.color;window.fracBonus=window.tempFaction.bonus;window.selectedShipIndex=window.tempShipIndex;window.shipName=name;
            ['sd_frac','sd_color','sd_bonus','sd_ship_index','sd_ship_name'].forEach(k=>localStorage.setItem(k,window[k]));saveAll();
            window.showUI();document.getElementById('content-overlay').style.display='none';
            const center=getMapCenter();document.getElementById('planet-container').style.left=center.x+'px';document.getElementById('planet-container').style.top=center.y+'px';
            parkShipOnPlanet();window.generateObjects();updateHangar();updateLeaderboard();
        };
        window.switchTab=function(tab){
            window.currentTab=tab;document.querySelectorAll('.nav-btn').forEach(b=>b.classList.remove('active'));document.getElementById('nav-'+tab).classList.add('active');
            document.querySelectorAll('.bg-object').forEach(o=>o.style.display=tab==='map'?'block':'none');
            if(tab==='map'){document.getElementById('content-overlay').style.display='none';}
            else{document.getElementById('content-overlay').style.display='flex';
                if(tab==='hangar'){window.showWindow('hangar');const hangarDiv=document.getElementById('hangar-ship-display');hangarDiv.innerHTML='';hangarDiv.appendChild(window.createPlayerShip(1.0));updateHangar();}
                else if(tab==='pvp'){window.showWindow('pvp');const playerDiv=document.getElementById('pvp-player-ship-display');playerDiv.innerHTML='';playerDiv.appendChild(window.createPlayerShip(1.0));const enemyDiv=document.getElementById('pvp-enemy-ship-display');enemyDiv.innerHTML='';enemyDiv.appendChild(window.createEnemyShip(Math.floor(Math.random()*3)));updateLeaderboard();}
                else if(tab==='vip'){window.showWindow('vip');updateVipWindow();}
            }
        };
        function updateVipWindow(){document.getElementById('vip-level').innerText=window.vipLevel;document.getElementById('vip-mult').innerText=window.getMultiplier();}
        window.upgradeVip=function(){if(window.vipLevel<4){window.vipLevel++;localStorage.setItem('sd_vip',window.vipLevel);saveAll();updateVipWindow();updateTopPanel();}};
        function getStats(){
            const base = FACTION_STATS[window.fracBonus] || { shield:20, damage:20, speed:20 };
            let shield = base.shield + window.upgrades.shield * 2;
            let damage = base.damage + window.upgrades.damage * 2;
            let attackSpeed = base.speed * 50;
            attackSpeed = Math.max(500, attackSpeed - window.upgrades.speed * 30);
            let critDodge = 5 + window.upgrades.crit * 2;
            return { shield:Math.max(1,shield), damage:Math.max(1,damage), attackSpeed:Math.max(500,attackSpeed), critDodge:Math.min(critDodge,40) };
        }
        window.searchPvP=function(){
            if(window.pvpInterval||window.pvpTimerInterval)return;let timer=15;document.getElementById('pvp-timer').innerText=timer;document.getElementById('pvp-status').innerText='Бой...';
            const stats = getStats();
            let pHP=stats.shield,eHP=8+Math.floor(Math.random()*12),timeLeft=15;
            document.getElementById('pvp-timer').innerText=timeLeft;
            document.getElementById('pvp-enemy-ship').innerHTML='';document.getElementById('pvp-enemy-ship').appendChild(window.createEnemyShip(Math.floor(Math.random()*3)));
            window.pvpTimerInterval=setInterval(()=>{timeLeft--;document.getElementById('pvp-timer').innerText=timeLeft;if(timeLeft<=0)endPvP(pHP,eHP);},1000);
            window.pvpInterval=setInterval(()=>{
                let dmg=Math.floor(Math.random()*stats.damage)+1;if(Math.random()*100<stats.critDodge)dmg*=2;
                eHP-=dmg;document.getElementById('pvp-enemy-hp-text').innerText='HP:'+Math.max(0,eHP);
                if(eHP<=0){endPvP(pHP,0);return;}
                setTimeout(()=>{if(eHP<=0)return;let eDmg=Math.floor(Math.random()*5)+2;if(Math.random()*100<stats.critDodge)document.getElementById('pvp-status').innerText='УКЛОН!';else{pHP-=eDmg;document.getElementById('pvp-player-hp-text').innerText='HP:'+Math.max(0,pHP);}if(pHP<=0)endPvP(0,eHP);},500);
            },Math.max(stats.attackSpeed,500));
        };
        function endPvP(pHP,eHP){
            clearInterval(window.pvpInterval);clearInterval(window.pvpTimerInterval);window.pvpInterval=null;window.pvpTimerInterval=null;
            let result;if(pHP<=0&&eHP<=0){result='НИЧЬЯ! +2';window.pvpScore+=2;}else if(eHP<=0){result='ПОБЕДА! +15';window.pvpScore+=15;}else if(pHP<=0){result='ПОРАЖЕНИЕ... -12';window.pvpScore=Math.max(0,window.pvpScore-12);}else{result='НИЧЬЯ! +2';window.pvpScore+=2;}
            document.getElementById('pvp-status').innerText=result;document.getElementById('pvp-timer').innerText='0';updateLeaderboard();saveAll();
        }
        function updateLeaderboard(){
            const idx=window.leaderboard.findIndex(p=>p.name===window.playerName);if(idx>=0)window.leaderboard[idx].score=window.pvpScore;else if(window.playerName)window.leaderboard.push({name:window.playerName,score:window.pvpScore});
            window.leaderboard.sort((a,b)=>b.score-a.score);window.leaderboard=window.leaderboard.slice(0,15);const list=document.getElementById('leaderboard');
            if(list)list.innerHTML='<div style="color:#aa9933">ТОП 15</div>'+window.leaderboard.map((p,i)=>`<div>#${i+1} ${p.name}: ${p.score}</div>`).join('');saveAll();
        };
        window.goBack=()=>{if(window.currentTab!=='map')window.switchTab('map');};

        // Инициализация
        function init(){
            createBackground();setupPixelPlanet();
            if(window.playerName&&window.frac){window.showUI();document.getElementById('content-overlay').style.display='none';const center=getMapCenter();document.getElementById('planet-container').style.left=center.x+'px';document.getElementById('planet-container').style.top=center.y+'px';parkShipOnPlanet();window.generateObjects();updateHangar();updateLeaderboard();}
            else if(window.playerName){window.showWindow('faction');}
            else{window.showWindow('start');}
        }
        if(document.readyState==='loading')document.addEventListener('DOMContentLoaded',init);else init();
    </script>
</body>
</html>
