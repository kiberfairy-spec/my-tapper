<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Space Dream: Survival</title>
    <script src="https://telegram.org"></script>
    <style>
        body {
            background: radial-gradient(circle, #101216 0%, #050608 100%);
            color: #e0e6ed;
            font-family: 'Segoe UI', Roboto, sans-serif;
            text-align: center;
            margin: 0;
            padding-top: 60px;
            user-select: none;
        }
        .status-container {
            font-size: 20px;
            letter-spacing: 2px;
            color: #a0aec0;
            margin-bottom: 10px;
        }
        .score-container {
            font-size: 42px;
            font-weight: 800;
            color: #ff4a4a; /* Огненно-красный под цвет лавы */
            text-shadow: 0 0 20px rgba(255, 74, 74, 0.6);
            margin-bottom: 50px;
        }
        #core-button {
            width: 220px;
            height: 220px;
            background: radial-gradient(circle, #ff6b6b 0%, #b71c1c 100%);
            border: 4px solid #ff4a4a;
            border-radius: 50%;
            margin: 0 auto;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            font-weight: bold;
            color: #ffffff;
            box-shadow: 0 0 35px rgba(255, 28, 28, 0.4);
            cursor: pointer;
            transition: transform 0.05s, box-shadow 0.1s;
        }
        #core-button:active {
            transform: scale(0.93);
            box-shadow: 0 0 50px rgba(255, 28, 28, 0.7);
        }
    </style>
</head>
<body>

    <div class="status-container">СИСТЕМА ЖИЗНЕОБЕСПЕЧЕНИЯ</div>
    <div class="score-container">
        <span id="balance">0</span> ГВт
    </div>

    <div id="core-button">ЗАПУСТИТЬ РЕАКТОР</div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();

        // 1. Пытаемся загрузить сохраненный баланс из памяти телефона
        // Если там ничего нет (первый вход), ставим 0
        let score = parseInt(localStorage.getItem('space_score')) || 0;
        
        const balanceEl = document.getElementById('balance');
        const buttonEl = document.getElementById('core-button');

        // Отображаем сохраненный баланс сразу при запуске игры
        balanceEl.innerText = score;

        buttonEl.addEventListener('click', () => {
            score++;
            balanceEl.innerText = score;

            // 2. Сохраняем новое значение в память при каждом клике
            localStorage.setItem('space_score', score);

            if (tg.HapticFeedback) {
                tg.HapticFeedback.impactOccurred('medium');
            }
        });
    </script>
</body>
</html>
