<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Space Dream</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap');
        * { margin:0; padding:0; box-sizing:border-box; }
        body { background:#000; color:#0f0; font-family:'Press Start 2P',monospace; user-select:none; -webkit-user-select:none; overflow:hidden; height:100dvh; width:100dvw; position:fixed; }
        .stars-layer { position:fixed; top:0; left:0; width:100%; height:100%; pointer-events:none; z-index:0; background:radial-gradient(ellipse at 50% 50%, #010310 0%, #000008 60%, #000 100%); }
        .star { position:absolute; background:#fff; border-radius:50%; animation:twinkle var(--duration) infinite; animation-delay:var(--delay); }
        @keyframes twinkle { 0%,100%{opacity:0.1;transform:scale(0.8)} 50%{opacity:0.9;transform:scale(1.3)} }
        @keyframes rotate { from{transform:rotate(0deg)} to{transform:rotate(360deg)} }
        @keyframes slideUp { from{transform:translateY(100%);opacity:0} to{transform:translateY(0);opacity:1} }
        .app-container { position:relative; width:100%; height:100dvh; display:flex; flex-direction:column; }
        .background-map { position:fixed; top:0; left:0; width:100%; height:calc(100dvh - 80px); z-index:1; pointer-events:none; }
        .galaxy-bg { position:relative; width:100%; height:100%; overflow:hidden; background:transparent; }
        .planet-container { position:absolute; top:50%; left:50%; transform:translate(-50%,-50%); z-index:2; }
        .pixel-planet { width:160px; height:100px; position:relative; }
        .player-docked { position:absolute; z-index:10; pointer-events:none; }
        .bg-object { position:absolute; z-index:2; pointer-events:none; transition:opacity 0.3s; transform:translate(-50%,-50%); cursor:pointer; }
        .top-panel { position:fixed; top:0; left:0; right:0; height:50px; display:flex; justify-content:space-between; align-items:center; padding:5px 10px; z-index:100; pointer-events:none; }
        .vip-badge { background:rgba(0,0,0,0.8); border:2px solid #ffaa00; color:#ffaa00; padding:4px 8px; font-size:7px; pointer-events:all; text-align:center; }
        .resources-panel { display:flex; gap:5px; align-items:center; flex-wrap:wrap; }
        .resource-badge { background:rgba(0,0,0,0.85); border:2px solid #bb9922; color:#bb9922; padding:4px 6px; font-size:7px; pointer-events:all; text-align:center; }
        .fuel-badge { border-color:#4488ff; color:#4488ff; }
        .credits-badge { border-color:#ffcc00; color:#ffcc00; }
        .spice-badge { border-color:#ff66ff; color:#ff66ff; }
        .shards-badge { border-color:#66ff99; color:#66ff99; }
        .refuel-btn { background:#4488ff; color:#fff; border:none; padding:4px 8px; font-size:7px; cursor:pointer; font-family:'Press Start 2P',monospace; pointer-events:all; margin-left:5px; display:none; }
        .dev-reset-btn { background:#aa3333; color:#fff; border:none; padding:4px 8px; font-size:7px; cursor:pointer; font-family:'Press Start 2P',monospace; pointer-events:all; margin-left:5px; display:inline-block; }
        .back-btn { width:34px; height:34px; background:rgba(0,20,0,0.9); border:2px solid #00aa44; color:#00dd55; font-size:15px; cursor:pointer; display:none; align-items:center; justify-content:center; font-family:'Press Start 2P',monospace; pointer-events:all; }
        .loot-feed { position:fixed; bottom:85px; left:50%; transform:translateX(-50%); z-index:200; pointer-events:none; display:flex; align-items:center; justify-content:center; gap:6px; flex-wrap:wrap; min-height:26px; }
        .loot-item { font-family:'Press Start 2P',monospace; font-size:7px; color:#ffcc00; background:rgba(0,0,0,0.8); padding:4px 8px; animation:fadeInOut 2.5s ease-in-out forwards; }
        @keyframes fadeInOut { 0%{opacity:0;transform:translateY(10px)} 15%{opacity:1;transform:translateY(0)} 80%{opacity:1;transform:translateY(0)} 100%{opacity:0;transform:translateY(-10px)} }
        .content-overlay { position:fixed; top:50px; left:0; right:0; bottom:80px; z-index:50; pointer-events:none; display:flex; align-items:center; justify-content:center; }
        .content-overlay > * { pointer-events:all; }
        .bottom-panel { position:fixed; bottom:0; left:0; right:0; height:80px; background:rgba(2,2,10,0.96); border-top:2px solid #009944; display:flex; justify-content:space-around; align-items:center; z-index:100; padding:4px; }
        .nav-btn { background:#040c04; border:2px solid #006633; color:#00aa44; padding:5px 8px; font-family:'Press Start 2P',monospace; font-size:6px; cursor:pointer; transition:all 0.2s; text-align:center; flex:1; margin:0 2px; max-width:90px; }
        .nav-btn.active { background:#061806; border-color:#bb9922; }
        .window { background:rgba(2,2,14,0.94); border:2px solid #009944; padding:14px; max-width:320px; width:88%; max-height:55vh; overflow-y:auto; animation:slideUp 0.3s ease-out; }
        .window-title { color:#bb9922; font-size:10px; margin-bottom:10px; text-align:center; }
        .input-field { width:100%; padding:8px; margin:6px 0; background:#040410; border:2px solid #009944; color:#00bb44; font-family:'Press Start 2P',monospace; font-size:8px; text-align:center; }
        .btn { width:100%; padding:8px; margin:5px 0; background:#040c04; border:2px solid #009944; color:#00bb44; font-family:'Press Start 2P',monospace; font-size:8px; cursor:pointer; transition:all 0.2s; }
        .btn:disabled { background:#161616; color:#333; border-color:#333; cursor:not-allowed; }
        .btn-small { width:auto; padding:3px 6px; font-size:6px; }
        .hidden { display:none !important; }
        .flex-row { display:flex; gap:8px; flex-wrap:wrap; justify-content:center; }
        .upgrade-row { display:flex; justify-content:space-between; padding:4px; border:1px solid #009944; margin:2px 0; align-items:center; }
        .artifact-card { border:2px solid #009944; padding:6px; margin:4px; cursor:pointer; text-align:center; min-width:70px; }
        .artifact-card.selected { border-color:#ffaa00; }
        .pvp-stats { font-size:6px; margin:5px 0; }
    </style>
</head>
<body>
<div class="stars-layer" id="stars-layer"></div>
<div class="app-container">
    <div class="background-map" id="background-map">
        <div class="galaxy-bg" id="galaxy-bg">
            <div class="planet-container" id="planet-container"><div class="pixel-planet" id="pixel-planet"></div></div>
            <div class="player-docked" id="player-docked"></div>
        </div>
    </div>
    <div class="top-panel">
        <div style="display:flex; gap:8px; align-items:center;">
            <button class="back-btn" id="back-btn" onclick="goBack()">←</button>
            <div class="vip-badge" id="vip-badge">⭐ VIP 0</div>
            <button class="dev-reset-btn" id="dev-reset-btn" onclick="devReset()">🔄 СБРОС</button>
        </div>
        <div class="resources-panel" id="resources-panel">
            <div class="resource-badge credits-badge">🪙 <span id="credits-value">0</span></div>
            <div class="resource-badge fuel-badge">⛽ <span id="fuel-value">100/100</span></div>
            <div class="resource-badge spice-badge">💎 <span id="spice-value">0</span></div>
            <div class="resource-badge shards-badge">🧩 <span id="shards-value">0</span></div>
            <button class="refuel-btn" id="refuel-btn" onclick="freeRefuel()">БЕСПЛ. ЗАПРАВКА</button>
        </div>
    </div>
    <div class="loot-feed" id="loot-feed"></div>
    <div class="content-overlay" id="content-overlay">
        <!-- Окна -->
        <div class="window" id="window-start">
            <div class="window-title">SPACE DREAM</div>
            <input type="text" class="input-field" id="input-player-name" placeholder="ИМЯ ИГРОКА" maxlength="12">
            <button class="btn" onclick="setPlayerName()">ДАЛЕЕ</button>
        </div>
        <div class="window hidden" id="window-faction">
            <div class="window-title">ВЫБЕРИ ФРАКЦИЮ</div>
            <button class="btn" style="border-color:#4488aa;color:#4488aa" onclick="selectFaction('Конфедерация','#4488aa','tank')">◆ КОНФЕДЕРАЦИЯ<br><small>Защита:40 | Урон:20 | Скорость:15</small></button>
            <button class="btn" style="border-color:#aa5533;color:#aa5533" onclick="selectFaction('Повстанцы','#aa5533','dps')">◆ ПОВСТАНЦЫ<br><small>Защита:15 | Урон:25 | Скорость:35</small></button>
            <button class="btn" style="border-color:#aa9933;color:#aa9933" onclick="selectFaction('Торговая гильдия','#aa9933','sniper')">◆ ТОРГОВАЯ ГИЛЬДИЯ<br><small>Защита:20 | Урон:40 | Скорость:15</small></button>
        </div>
        <div class="window hidden" id="window-ship">
            <div class="window-title">ВЫБЕРИ КОРАБЛЬ</div>
            <div id="ship-selection" class="flex-row"></div>
            <input type="text" class="input-field" id="input-ship-name" placeholder="ИМЯ КОРАБЛЯ" maxlength="14">
            <button class="btn" id="confirm-ship-btn" onclick="confirmShip()" disabled>ПОДТВЕРДИТЬ</button>
        </div>
        <div class="window hidden" id="window-hangar">
            <div class="window-title">АНГАР</div>
            <div id="hangar-ship-display" style="text-align:center;margin:5px 0;"></div>
            <div id="hangar-resources" class="flex-row" style="font-size:7px;margin:5px 0;"></div>
            <div id="upgrades-list"></div>
            <div style="margin-top:10px;border-top:1px solid #009944;padding-top:6px;">
                <div class="window-title" style="font-size:8px;">АРТЕФАКТЫ</div>
                <div id="artifact-section"></div>
            </div>
        </div>
        <div class="window hidden" id="window-pvp">
            <div class="window-title">PvP АРЕНА</div>
            <div class="flex-row" style="align-items:center;margin:8px 0;">
                <div id="pvp-player-ship-display"></div>
                <span style="color:#aa3333;font-size:10px;">VS</span>
                <div id="pvp-enemy-ship-display"></div>
            </div>
            <div style="text-align:center;font-size:8px;color:#aa9933" id="pvp-timer">10</div>
            <div style="text-align:center;font-size:6px" id="pvp-status">Нажмите НАЙТИ БОЙ</div>
            <button class="btn" onclick="searchPvP()">НАЙТИ БОЙ</button>
            <div class="leaderboard" id="leaderboard" style="max-height:120px;overflow-y:auto;font-size:6px;margin-top:6px;"></div>
        </div>
        <div class="window hidden" id="window-vip">
            <div class="window-title">VIP СТАТУС</div>
            <p style="font-size:8px;">Уровень: <span id="vip-level">0</span></p>
            <p style="font-size:8px;">Множитель добычи: x<span id="vip-mult">1</span></p>
            <p style="font-size:8px;">Скидка на улучшения: <span id="vip-discount">0</span>%</p>
            <button class="btn" onclick="upgradeVip()">УЛУЧШИТЬ VIP</button>
        </div>
        <div class="window hidden" id="window-battlepass">
            <div class="window-title">БАТЛ-ПАСС (сезон)</div>
            <p style="font-size:7px;">Уровень: <span id="bp-level">0</span> / 60</p>
            <p style="font-size:7px;">До конца сезона: <span id="season-remaining">45</span> дней</p>
            <button class="btn" onclick="buyBattlePass()">КУПИТЬ БАТЛ-ПАСС (15 USDT)</button>
            <button class="btn btn-small" onclick="claimBPReward()">ПОЛУЧИТЬ НАГРАДУ</button>
            <div id="bp-rewards" style="font-size:6px;margin-top:5px;"></div>
        </div>
    </div>
    <div class="bottom-panel hidden" id="bottom-panel">
        <button class="nav-btn active" id="nav-map" onclick="switchTab('map')">🌌 КАРТА</button>
        <button class="nav-btn" id="nav-hangar" onclick="switchTab('hangar')">🚀 АНГАР</button>
        <button class="nav-btn" id="nav-pvp" onclick="switchTab('pvp')">⚔️ PvP</button>
        <button class="nav-btn" id="nav-vip" onclick="switchTab('vip')">⭐ VIP</button>
        <button class="nav-btn" id="nav-bp" onclick="switchTab('battlepass')">🎫 ПАСС</button>
    </div>
</div>
<script>
// ----------------------------------------------------------------------
//  1. КОНСТАНТЫ И ДАННЫЕ
// ----------------------------------------------------------------------

// Палитры и спрайты (из исходного кода, оставляем)
const PALETTE = { 'A':'#2E0A4E','B':'#5B2C8E','C':'#8B5FBF','P':'#FF44AA','Q':'#44CCFF', 'R':'#8B0000','D':'#2A2A2A','E':'#FF4500','F':'#FF6600','G':'#FFAA00','H':'#FFD700', '_':null };
const UFO_PALETTE = { 1:'#14143d',2:'#346cbd',3:'#7cb5ec',4:'#e1f3ff',5:'#73737c',6:'#ffffff',7:'#ff9000' };
const player1Matrix = [
"__________A___________","_________AAA__________","_________AAA__________","________AAAAA_________","________AACAA_________","________ACCCA_________","________ACCCA_________","________AAAAA_________","________APBBA_________","________ABBBB_________","________ABBBB_________","_______AABABAA_______","_______ABBABB_______","_______ABBCBA_______","_______ABBCBA_______","_____AAABBABBAAA_____","____ABBABBBBBABB____","___ABBBABBBBBABBBA___","__ABBBBABBBBBABBBB__","_ABBBBBAPBBBPABBBBB_","ABBBBBBAAAAAAABBBBBBA","ABQQBBBABBBBBABBBQQBA","AAAAAAAAABBBBBAAAAAAAAA","_______AAAAAAA_______","________AAAAA_________","_______AAA_AAA_______","_______AAA_AAA_______","________QQ_QQ_________","________QQ_QQ_________","________QB_QB_________","_________Q__Q________","_________Q__Q________"
];
// UFO (упрощённо) – для краткости используем эмодзи или заготовку
function createUfoMatrix() { /* заглушка – вернём простую матрицу */ return []; }

const SHIP_SPRITES = {
    player1: player1Matrix,
    player2: createUfoMatrix(),
    player3: []
};
// Функция отрисовки корабля (упрощена, но рабочая)
function drawShipSprite(matrix, scale=1) {
    if (!matrix || matrix.length===0) {
        const s = document.createElement('span'); s.style.fontSize='30px'; s.innerText='🚀'; return s;
    }
    const rows = matrix.length, cols = matrix[0].length;
    const tileSize = Math.max(2, Math.round(6 * scale));
    const canvas = document.createElement('canvas');
    canvas.width = cols * tileSize; canvas.height = rows * tileSize;
    const ctx = canvas.getContext('2d');
    ctx.imageSmoothingEnabled = false;
    canvas.style.imageRendering = 'pixelated';
    const isNumeric = typeof matrix[0][0] === 'number';
    for (let y=0; y<rows; y++) {
        for (let x=0; x<cols; x++) {
            const key = matrix[y][x];
            if (key === '_' || key === 0 || key === undefined) continue;
            let color;
            if (isNumeric) color = UFO_PALETTE[key] || '#888';
            else color = PALETTE[key] || '#888';
            ctx.fillStyle = color;
            ctx.fillRect(x * tileSize, y * tileSize, tileSize, tileSize);
        }
    }
    const wrapper = document.createElement('div');
    wrapper.style.display = 'inline-block';
    wrapper.style.pointerEvents = 'none';
    wrapper.style.imageRendering = 'pixelated';
    wrapper.appendChild(canvas);
    return wrapper;
}
window.createPlayerShip = (scale=1) => {
    const idx = (window.selectedShipIndex || 0) + 1;
    const matrix = SHIP_SPRITES[`player${idx}`] || [];
    return drawShipSprite(matrix, scale);
};
window.createEnemyShip = (variant=0) => {
    const s = document.createElement('span'); s.style.fontSize='30px'; s.innerText='👾'; return s;
};

// Фракции
const FACTION_STATS = {
    tank:   { shield:40, damage:20, speed:15 },
    dps:    { shield:15, damage:25, speed:35 },
    sniper: { shield:20, damage:40, speed:15 }
};

// Артефакты
const ARTIFACTS = [
    { id:'phantom_blade', name:'Клинок Фантома', desc:'+5% урона/ур', effect:'damage', perLevel:5 },
    { id:'shield_imperishability', name:'Щит Нерушимости', desc:'+5% защиты/ур', effect:'shield', perLevel:5 },
    { id:'vortex_engine', name:'Двигатель Вихря', desc:'+5% скорости/ур', effect:'speed', perLevel:5 },
    { id:'vampire_crystal', name:'Вампирический Кристалл', desc:'3% шанс восстановить 10% HP/ур', effect:'vampire', perLevel:3 },
    { id:'eye_of_foresight', name:'Глаз Предвидения', desc:'3% шанс уклонения/ур', effect:'dodge', perLevel:3 }
];

// ----------------------------------------------------------------------
//  2. СОСТОЯНИЕ ИГРОКА (localStorage)
// ----------------------------------------------------------------------

const defaultState = {
    playerName: '',
    shipName: '',
    faction: null,
    factionColor: '#00aa44',
    factionBonus: null,
    shipIndex: 0,
    resources: { credits:0, fuel:100, shieldParts:0, weaponParts:0, speedParts:0, spice:0, shards:0 },
    maxFuel: 100,
    upgrades: { damage:0, shield:0, speed:0, luck:0, fuelTank:0 },
    artifact: { id:null, level:0 },
    vip: 0,
    pvpScore: 0,
    leaderboard: [],
    freeRefuelUsed: false,
    battlePass: { level:0, paid:false, claimed:false },
    seasonStart: Date.now()
};

// Загрузка
function loadState() {
    const s = defaultState;
    try {
        s.playerName = localStorage.getItem('sd_player_name') || '';
        s.shipName = localStorage.getItem('sd_ship_name') || '';
        s.faction = localStorage.getItem('sd_frac') || null;
        s.factionColor = localStorage.getItem('sd_color') || '#00aa44';
        s.factionBonus = localStorage.getItem('sd_bonus') || null;
        s.shipIndex = parseInt(localStorage.getItem('sd_ship_index')) || 0;
        s.resources.credits = parseInt(localStorage.getItem('sd_credits')) || 0;
        s.resources.fuel = parseInt(localStorage.getItem('sd_fuel')) || 100;
        s.resources.shieldParts = parseInt(localStorage.getItem('sd_shieldParts')) || 0;
        s.resources.weaponParts = parseInt(localStorage.getItem('sd_weaponParts')) || 0;
        s.resources.speedParts = parseInt(localStorage.getItem('sd_speedParts')) || 0;
        s.resources.spice = parseInt(localStorage.getItem('sd_spice')) || 0;
        s.resources.shards = parseInt(localStorage.getItem('sd_shards')) || 0;
        s.maxFuel = parseInt(localStorage.getItem('sd_maxFuel')) || 100;
        s.upgrades.damage = parseInt(localStorage.getItem('sd_upg_damage')) || 0;
        s.upgrades.shield = parseInt(localStorage.getItem('sd_upg_shield')) || 0;
        s.upgrades.speed = parseInt(localStorage.getItem('sd_upg_speed')) || 0;
        s.upgrades.luck = parseInt(localStorage.getItem('sd_upg_luck')) || 0;
        s.upgrades.fuelTank = parseInt(localStorage.getItem('sd_upg_fuelTank')) || 0;
        s.artifact.id = localStorage.getItem('sd_artifact_id') || null;
        s.artifact.level = parseInt(localStorage.getItem('sd_artifact_level')) || 0;
        s.vip = parseInt(localStorage.getItem('sd_vip')) || 0;
        s.pvpScore = parseInt(localStorage.getItem('sd_pvp_score')) || 0;
        s.leaderboard = JSON.parse(localStorage.getItem('sd_leaderboard')) || [];
        s.freeRefuelUsed = localStorage.getItem('sd_free_refuel') === 'true';
        s.battlePass.level = parseInt(localStorage.getItem('sd_bp_level')) || 0;
        s.battlePass.paid = localStorage.getItem('sd_bp_paid') === 'true';
        s.battlePass.claimed = localStorage.getItem('sd_bp_claimed') === 'true';
        s.seasonStart = parseInt(localStorage.getItem('sd_season_start')) || Date.now();
    } catch(e) {}
    return s;
}

let state = loadState();

// Сохранение
function saveState() {
    const s = state;
    localStorage.setItem('sd_player_name', s.playerName);
    localStorage.setItem('sd_ship_name', s.shipName);
    localStorage.setItem('sd_frac', s.faction);
    localStorage.setItem('sd_color', s.factionColor);
    localStorage.setItem('sd_bonus', s.factionBonus);
    localStorage.setItem('sd_ship_index', s.shipIndex);
    localStorage.setItem('sd_credits', s.resources.credits);
    localStorage.setItem('sd_fuel', s.resources.fuel);
    localStorage.setItem('sd_shieldParts', s.resources.shieldParts);
    localStorage.setItem('sd_weaponParts', s.resources.weaponParts);
    localStorage.setItem('sd_speedParts', s.resources.speedParts);
    localStorage.setItem('sd_spice', s.resources.spice);
    localStorage.setItem('sd_shards', s.resources.shards);
    localStorage.setItem('sd_maxFuel', s.maxFuel);
    localStorage.setItem('sd_upg_damage', s.upgrades.damage);
    localStorage.setItem('sd_upg_shield', s.upgrades.shield);
    localStorage.setItem('sd_upg_speed', s.upgrades.speed);
    localStorage.setItem('sd_upg_luck', s.upgrades.luck);
    localStorage.setItem('sd_upg_fuelTank', s.upgrades.fuelTank);
    localStorage.setItem('sd_artifact_id', s.artifact.id);
    localStorage.setItem('sd_artifact_level', s.artifact.level);
    localStorage.setItem('sd_vip', s.vip);
    localStorage.setItem('sd_pvp_score', s.pvpScore);
    localStorage.setItem('sd_leaderboard', JSON.stringify(s.leaderboard));
    localStorage.setItem('sd_free_refuel', s.freeRefuelUsed);
    localStorage.setItem('sd_bp_level', s.battlePass.level);
    localStorage.setItem('sd_bp_paid', s.battlePass.paid);
    localStorage.setItem('sd_bp_claimed', s.battlePass.claimed);
    localStorage.setItem('sd_season_start', s.seasonStart);
}

// ----------------------------------------------------------------------
//  3. ВСПОМОГАТЕЛЬНЫЕ ФУНКЦИИ
// ----------------------------------------------------------------------

function updateTopPanel() {
    const r = state.resources;
    document.getElementById('vip-badge').innerHTML = `⭐ VIP ${state.vip}`;
    document.getElementById('credits-value').innerText = Math.floor(r.credits);
    document.getElementById('fuel-value').innerText = Math.floor(r.fuel)+'/'+state.maxFuel;
    document.getElementById('spice-value').innerText = r.spice;
    document.getElementById('shards-value').innerText = r.shards;
    const refuelBtn = document.getElementById('refuel-btn');
    refuelBtn.style.display = (r.fuel === 0 && !state.freeRefuelUsed) ? 'inline-block' : 'none';
}

function showLoot(name, amount) {
    const feed = document.getElementById('loot-feed');
    const item = document.createElement('span');
    item.className = 'loot-item';
    item.innerText = `+${amount} ${name}`;
    feed.appendChild(item);
    setTimeout(() => item.remove(), 2500);
}

function showWindow(id) {

const planetColors = {1:'#3c1a5b',2:'#b094fa',3:'#f25cf2',4:'#ff9eff',5:'#e3e8ff'};
const W=64,H=40;
let planetMatrix = Array(H).fill().map(()=>Array(W).fill(0));
const cX=32,cY=20,rad=14;
for(let y=0;y<H;y++)for(let x=0;x<W;x++){const dx=x-cX,dy=y-cY;if(dx*dx+dy*dy<=rad*rad){planetMatrix[y][x]=2;if((y>=10&&y<=13)||(y>=18&&y<=22)||(y>=27&&y<=29))planetMatrix[y][x]=3;if((y===9&&x===28)||(y===10&&x===29)||(y===21&&x===24))planetMatrix[y][x]=4;}}
// Упрощённо рисуем
function drawPlanet() {
    const container = document.getElementById('pixel-planet');
    container.innerHTML = '';
    const ps = 2.5;
    const canvas = document.createElement('canvas');
    canvas.width = W*ps; canvas.height = H*ps;
    const ctx = canvas.getContext('2d');
    ctx.imageSmoothingEnabled = false;
    for (let y=0;y<H;y++)for (let x=0;x<W;x++){const c=planetMatrix[y][x];if(c){ctx.fillStyle=planetColors[c];ctx.fillRect(x*ps,y*ps,ps,ps);}}
    canvas.style.cssText = 'display:block;width:100%;height:100%;image-rendering:pixelated;';
    const wrapper = document.createElement('div');
    wrapper.style.cssText = 'width:100%;height:100%;display:flex;align-items:center;justify-content:center;animation:rotate 60s linear infinite;';
    wrapper.appendChild(canvas);
    container.appendChild(wrapper);
}

function generateLoot() {
    const mult = (state.vip === 0) ? 1 : (1 + state.vip * 0.2); // множитель VIP
    let nothingChance = 55 - state.upgrades.luck * 2;
    if (nothingChance < 5) nothingChance = 5;
    const r = Math.random() * 100;
    if (r < nothingChance) return null;
    // Остальные шансы пересчитываем пропорционально:
    // 20% кредиты, 10% топливо, 6% щит, 6% оружие, 6% скорость, 2% спайс.
    // Сумма оставшихся шансов = 100 - nothingChance.
    const remaining = 100 - nothingChance;
    const creditsChance = 20 / 50 * remaining; // 20 из 50 исходных
    const fuelChance = 10 / 50 * remaining;
    const shieldChance = 6 / 50 * remaining;
    const weaponChance = 6 / 50 * remaining;
    const speedChance = 6 / 50 * remaining;
    const spiceChance = 2 / 50 * remaining;
    // Определяем выпадение
    let roll = Math.random() * remaining;
    if (roll < creditsChance) {
        const amt = Math.floor((10 + Math.random()*91) * mult);
        state.resources.credits += amt;
        return { name:'Кредиты', amount:amt };
    } else if (roll < creditsChance + fuelChance) {
        const amt = Math.floor((5 + Math.random()*11) * mult);
        state.resources.fuel = Math.min(state.maxFuel, state.resources.fuel + amt);
        return { name:'Топливо', amount:amt };
    } else if (roll < creditsChance + fuelChance + shieldChance) {
        const amt = Math.floor((1 + Math.random()*5) * mult);
        state.resources.shieldParts += amt;
        return { name:'Детали щита', amount:amt };
    } else if (roll < creditsChance + fuelChance + shieldChance + weaponChance) {
        const amt = Math.floor((1 + Math.random()*5) * mult);
        state.resources.weaponParts += amt;
        return { name:'Детали оружия', amount:amt };
    } else if (roll < creditsChance + fuelChance + shieldChance + weaponChance + speedChance) {
        const amt = Math.floor((1 + Math.random()*5) * mult);
        state.resources.speedParts += amt;
        return { name:'Детали скорости', amount:amt };
    } else {
        const amt = Math.floor((1 + Math.random()*3) * mult);
        state.resources.spice += amt;
        return { name:'Спайс', amount:amt };
    }
}

function getUpgradeCost(type) {
    const lvl = state.upgrades[type];
    if (type === 'fuelTank') {
        const credits = Math.floor(100 * Math.pow(2, lvl));
        const spice = Math.floor(50 * Math.pow(1.5, lvl));
        return { credits, spice, partsType: null, parts:0 };
    } else {
        const partsType = type==='shield'?'shieldParts':(type==='damage'?'weaponParts':(type==='speed'?'speedParts':'shieldParts'));
        const baseParts = 5, baseCredits = 50;
        let parts = Math.floor(baseParts * Math.pow(1.5, lvl));
        let credits = Math.floor(baseCredits * Math.pow(2, lvl));
        let spice = 0;
        if (lvl >= 15) { // 16-й уровень (индекс 15)
            spice = (lvl === 15) ? 10 : Math.floor(10 * Math.pow(1.6, lvl - 15));
        }
        // Применяем скидку VIP
        const discount = Math.min(state.vip * 5, 30);
        parts = Math.floor(parts * (1 - discount/100));
        credits = Math.floor(credits * (1 - discount/100));
        if (spice) spice = Math.floor(spice * (1 - discount/100));
        return { credits, spice, partsType, parts };
    }
}

function canBuyUpgrade(type) {
    const max = (type === 'fuelTank') ? 10 : (type === 'luck' ? 5 : 30);
    if (state.upgrades[type] >= max) return false;
    const cost = getUpgradeCost(type);
    if (state.resources.credits < cost.credits) return false;
    if (cost.spice && state.resources.spice < cost.spice) return false;
    if (cost.partsType && state.resources[cost.partsType] < cost.parts) return false;
    return true;
}

function buyUpgrade(type) {
    if (!canBuyUpgrade(type)) return;
    const cost = getUpgradeCost(type);
    state.resources.credits -= cost.credits;
    if (cost.spice) state.resources.spice -= cost.spice;
    if (cost.partsType) state.resources[cost.partsType] -= cost.parts;
    state.upgrades[type]++;
    if (type === 'fuelTank') {
        state.maxFuel += 10;
        state.resources.fuel = Math.min(state.resources.fuel + 10, state.maxFuel);
    }
    saveState();
    updateHangar();
    updateTopPanel();
}

function updateHangar() {
    const r = state.resources;
    document.getElementById('hangar-resources').innerHTML =
        `🪙${r.credits} ⛽${Math.floor(r.fuel)}/${state.maxFuel} 🛡️${r.shieldParts} ⚔️${r.weaponParts} ⚡${r.speedParts} 💎${r.spice} 🧩${r.shards}`;
    const list = document.getElementById('upgrades-list');
    const types = ['damage','shield','speed','luck','fuelTank'];
    const names = { damage:'УРОН', shield:'ЗАЩИТА', speed:'СКОРОСТЬ', luck:'УДАЧА', fuelTank:'ТОПЛИВНЫЙ БАК' };
    const maxMap = { damage:30, shield:30, speed:30, luck:5, fuelTank:10 };
    list.innerHTML = types.map(t => {
        const lvl = state.upgrades[t], max = maxMap[t];
        const cost = getUpgradeCost(t);
        const can = canBuyUpgrade(t);
        let costStr = `${cost.credits}🪙`;
        if (cost.spice) costStr += ` ${cost.spice}💎`;
        if (cost.partsType) costStr += ` ${cost.parts} ${cost.partsType==='shieldParts'?'🛡️':(cost.partsType==='weaponParts'?'⚔️':'⚡')}`;
        return `<div class="upgrade-row"><span>${names[t]} Ур.${lvl}/${max}</span><button class="btn btn-small" ${can&&lvl<max?'':'disabled'} onclick="buyUpgrade('${t}')">${costStr}</button></div>`;
    }).join('');
    // Артефакты
    updateArtifactSection();
}

function getArtifactCost(currentLevel) {
    const costs = {
        0: { shards: 5, spice: 30 },
        1: { shards: 8, spice: 30 },
        2: { shards: 16, spice: 30 },
        3: { shards: 31, spice: 30 },
        4: { shards: 43, spice: 30 }
    };
    return costs[currentLevel] || null;
}

function upgradeArtifact(artifactId) {
    if (state.artifact.id && state.artifact.id !== artifactId) {
        alert('Сначала снимите текущий артефакт');
        return;
    }
    const art = ARTIFACTS.find(a => a.id === artifactId);
    let level = state.artifact.level || 0;
    if (level >= 5) {
        alert('Максимальный уровень');
        return;
    }
    const cost = getArtifactCost(level);
    if (!cost) return;
    if (state.resources.shards < cost.shards || state.resources.spice < cost.spice) {
        alert('Не хватает ресурсов');
        return;
    }
    state.resources.shards -= cost.shards;
    state.resources.spice -= cost.spice;
    state.artifact.id = artifactId;
    state.artifact.level = level + 1;
    saveState();
    updateHangar();

function getFinalStats() {
    const base = FACTION_STATS[state.factionBonus] || { shield:20, damage:20, speed:15 };
    let shield = base.shield + state.upgrades.shield * 2;
    let damage = base.damage + state.upgrades.damage * 2;
    let speed = base.speed + state.upgrades.speed * 2;
    // Артефакт
    if (state.artifact.id) {
        const art = ARTIFACTS.find(a => a.id === state.artifact.id);
        const lvl = state.artifact.level;
        const bonus = art.perLevel * lvl;
        if (art.effect === 'damage') damage *= (1 + bonus/100);
        else if (art.effect === 'shield') shield *= (1 + bonus/100);
        else if (art.effect === 'speed') speed *= (1 + bonus/100);
        // vampire и dodge учитываются отдельно в симуляции
    }
    // Удача -> шанс крита
    let critChance = 5 + state.upgrades.luck * 2;
    return { damage, shield, speed, critChance, artifactEffect: state.artifact.id };
}

function generateEnemyStats() {
    // Генерируем противника со случайными параметрами (усреднённо)
    const base = FACTION_STATS[['tank','dps','sniper'][Math.floor(Math.random()*3)]];
    let shield = base.shield + Math.floor(Math.random() * 20);
    let damage = base.damage + Math.floor(Math.random() * 20);
    let speed = base.speed + Math.floor(Math.random() * 20);
    // Может иметь артефакт
    const hasArtifact = Math.random() < 0.5;
    let artifactEffect = null;
    if (hasArtifact) {
        const art = ARTIFACTS[Math.floor(Math.random()*5)];
        const lvl = Math.floor(Math.random()*5)+1;
        const bonus = art.perLevel * lvl;
        if (art.effect === 'damage') damage *= (1 + bonus/100);
        else if (art.effect === 'shield') shield *= (1 + bonus/100);
        else if (art.effect === 'speed') speed *= (1 + bonus/100);
        artifactEffect = art.effect;
    }
    const critChance = 5 + Math.floor(Math.random() * 10);
    return { damage, shield, speed, critChance, artifactEffect };
}

function simulatePvP(playerStats, enemyStats) {
    const HP = 1000;
    let pHP = HP, eHP = HP;
    let pNext = 0, eNext = 0;
    const myDelay = 100 / playerStats.speed;
    const enemyDelay = 100 / enemyStats.speed;
    // Доп. эффекты артефактов
    const myVampireChance = (playerStats.artifactEffect === 'vampire') ? state.artifact.level * 3 : 0;
    const myDodgeChance = (playerStats.artifactEffect === 'dodge') ? state.artifact.level * 3 : 0;
    const enemyVampireChance = (enemyStats.artifactEffect === 'vampire') ? 5 : 0; // пример
    const enemyDodgeChance = (enemyStats.artifactEffect === 'dodge') ? 5 : 0;

    for (let t = 0; t < 10; t += 0.1) {
        // Атака игрока
        if (t >= pNext) {
            let dmg = Math.max(0, playerStats.damage - enemyStats.shield * 0.5);
            if (Math.random() * 100 < playerStats.critChance) dmg *= 1.5;
            // Уклонение врага
            if (enemyDodgeChance && Math.random() * 100 < enemyDodgeChance) dmg = 0;
            eHP -= dmg;
            // Вампиризм игрока
            if (myVampireChance && Math.random() * 100 < myVampireChance) {
                pHP = Math.min(HP, pHP + HP * 0.1);
            }
            pNext = t + myDelay;
        }
        // Атака врага
        if (t >= eNext) {
            let dmg = Math.max(0, enemyStats.damage - playerStats.shield * 0.5);
            if (Math.random() * 100 < enemyStats.critChance) dmg *= 1.5;
            if (myDodgeChance && Math.random() * 100 < myDodgeChance) dmg = 0;
            pHP -= dmg;
            if (enemyVampireChance && Math.random() * 100 < enemyVampireChance) {
                eHP = Math.min(HP, eHP + HP * 0.1);
            }
            eNext = t + enemyDelay;
        }
        if (pHP <= 0 || eHP <= 0) break;
    }
    return { pHP, eHP };
}

function searchPvP() {
    if (!state.faction) return;
    const playerStats = getFinalStats();
    const enemyStats = generateEnemyStats();
    const result = simulatePvP(playerStats, enemyStats);
    let outcome;
    if (result.pHP <= 0 && result.eHP <= 0) outcome = 'НИЧЬЯ! +2';
    else if (result.eHP <= 0) outcome = 'ПОБЕДА! +15';
    else if (result.pHP <= 0) outcome = 'ПОРАЖЕНИЕ... -12';
    else outcome = 'НИЧЬЯ! +2';
    document.getElementById('pvp-status').innerText = outcome;
    // Рейтинг
    if (outcome.includes('ПОБЕДА')) state.pvpScore += 15;
    else if (outcome.includes('ПОРАЖЕНИЕ')) state.pvpScore = Math.max(0, state.pvpScore - 12);
    else state.pvpScore += 2;
    updateLeaderboard();
    saveState();
    // Отобразить HP
    document.getElementById('pvp-timer').innerText = '0';
}

function updateLeaderboard() {
    const idx = state.leaderboard.findIndex(p => p.name === state.playerName);
    if (idx >= 0) state.leaderboard[idx].score = state.pvpScore;
    else if (state.playerName) state.leaderboard.push({ name: state.playerName, score: state.pvpScore });
    state.leaderboard.sort((a,b) => b.score - a.score);
    state.leaderboard = state.leaderboard.slice(0, 15);
    const list = document.getElementById('leaderboard');
    if (list) list.innerHTML = '<div style="color:#aa9933">ТОП 15</div>' +
        state.leaderboard.map((p,i) => `<div>#${i+1} ${p.name}: ${p.score}</div>`).join('');
    saveState();
}

function seasonDaysLeft() {
    const end = state.seasonStart + 45 * 24 * 60 * 60 * 1000;
    const now = Date.now();
    if (now >= end) return 0;
    return Math.ceil((end - now) / (24 * 60 * 60 * 1000));
}

function getBPRewards(level) {
    // Упрощённо: каждый уровень даёт немного спайса, кредитов, деталей
    const rewards = [];
    if (level % 5 === 0) rewards.push({ name:'Спайс', amount: 50 + level*5 });
    if (level % 3 === 0) rewards.push({ name:'Кредиты', amount: 200 + level*20 });
    if (level % 2 === 0) rewards.push({ name:'Детали (случайные)', amount: 5 + level });
    return rewards;
}

function buyBattlePass() {
    if (state.battlePass.paid) {
        alert('Батл-пасс уже куплен');
        return;
    }
    // Имитация покупки за USDT (просто активируем)
    state.battlePass.paid = true;
    // Даём мгновенные награды за уже достигнутые уровни
    // (можно реализовать позже)
    saveState();
    updateBattlePassWindow();
}

function claimBPReward() {
    // Просто повышаем уровень (имитация прогресса)
    if (state.battlePass.level < 60) {
        state.battlePass.level++;
        // Начисляем награды
        const rewards = getBPRewards(state.battlePass.level);
        rewards.forEach(r => {
            if (r.name === 'Спайс') state.resources.spice += r.amount;
            else if (r.name === 'Кредиты') state.resources.credits += r.amount;
            else {
                // случайные детали
                const parts = ['shieldParts','weaponParts','speedParts'];
                const p = parts[Math.floor(Math.random()*3)];
                state.resources[p] += r.amount;
            }
        });
        saveState();
        updateBattlePassWindow();
        updateTopPanel();
    } else {
        alert('Максимальный уровень');
    }
}

// Проверка окончания сезона (при загрузке)
function checkSeason() {
    const days = seasonDaysLeft();
    if (days <= 0) {
        // Сброс: уровни урона/защиты/скорости на 20% (округляем вниз)
        state.upgrades.damage = Math.floor(state.upgrades.damage * 0.8);
        state.upgrades.shield = Math.floor(state.upgrades.shield * 0.8);
        state.upgrades.speed = Math.floor(state.upgrades.speed * 0.8);
        state.pvpScore = 0;
        state.battlePass.level = 0;
        state.battlePass.paid = false;
        state.seasonStart = Date.now();
        // Вывод спайса: можно показать сообщение
        saveState();
        alert('Новый сезон! Уровни сброшены на 20%, рейтинг обнулён.');
    }
}

// ----------------------------------------------------------------------
//  10. ИНИЦИАЛИЗАЦИЯ И НАВИГАЦИЯ
// ----------------------------------------------------------------------

function setPlayerName() {
    const name = document.getElementById('input-player-name').value.trim();
    if (name.length < 2) { alert('Минимум 2 символа'); return; }
    state.playerName = name;
    saveState();
    showWindow('faction');
}

function selectFaction(name, color, bonus) {
    state.faction = name;
    state.factionColor = color;
    state.factionBonus = bonus;
    saveState();
    // Показываем выбор корабля
    const container = document.getElementById('ship-selection');
    container.innerHTML = '';
    for (let i=0; i<3; i++) {
        const card = document.createElement('div');
        card.style.cssText = 'cursor:pointer;padding:6px;border:2px solid #009944;text-align:center;width:100px;height:120px;display:flex;align-items:center;justify-content:center;';
        const matrix = SHIP_SPRITES[`player${i+1}`] || [];
        card.appendChild(drawShipSprite(matrix, i===0?0.8:0.5));
        card.onclick = () => {
            state.shipIndex = i;
            container.querySelectorAll('div').forEach(d => d.style.borderColor = '#009944');
            card.style.borderColor = '#aa9933';
            document.getElementById('confirm-ship-btn').disabled = false;
        };
        container.appendChild(card);
    }
    document.getElementById('confirm-ship-btn').disabled = true;
    showWindow('ship');
}

function confirmShip() {
    const name = document.getElementById('input-ship-name').value.trim();
    if (state.shipIndex === null || name.length < 2) {
        alert('Выберите корабль и введите имя');
        return;
    }
    state.shipName = name;
    saveState();
    showUI();
    document.getElementById('content-overlay').style.display = 'none';
    const center = getMapCenter();
    document.getElementById('planet-container').style.left = center.x + 'px';
    document.getElementById('planet-container').style.top = center.y + 'px';
    parkShipOnPlanet();
    generateObjects();
    updateHangar();
    updateLeaderboard();
    updateVipWindow();
    updateBattlePassWindow();
    checkSeason();
}

function switchTab(tab) {
    const tabs = ['map','hangar','pvp','vip','battlepass'];
    document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
    document.getElementById('nav-'+tab).classList.add('active');
    document.querySelectorAll('.bg-object').forEach(o => o.style.display = (tab === 'map') ? 'block' : 'none');
    if (tab === 'map') {
        document.getElementById('content-overlay').style.display = 'none';
    } else {
        document.getElementById('content-overlay').style.display = 'flex';
        if (tab === 'hangar') {
            showWindow('hangar');
            const hangarDiv = document.getElementById('hangar-ship-display');
            hangarDiv.innerHTML = '';
            hangarDiv.appendChild(window.createPlayerShip(1.0));
            updateHangar();
        } else if (tab === 'pvp') {
            showWindow('pvp');
            document.getElementById('pvp-player-ship-display').innerHTML = '';
            document.getElementById('pvp-player-ship-display').appendChild(window.createPlayerShip(1.0));
            document.getElementById('pvp-enemy-ship-display').innerHTML = '';
            document.getElementById('pvp-enemy-ship-display').appendChild(window.createEnemyShip(Math.floor(Math.random()*3)));
            updateLeaderboard();
        } else if (tab === 'vip') {
            showWindow('vip');
            updateVipWindow();
        } else if (tab === 'battlepass') {
            showWindow('battlepass');
            updateBattlePassWindow();
        }
    }
}

function goBack() {
    if (state.faction) switchTab('map');
}

function devReset() {
    if (confirm('СБРОСИТЬ ВЕСЬ ПРОГРЕСС?')) {
        localStorage.clear();
        location.reload();
    }
}

// Запуск
function init() {
    createStars();
    drawPlanet();
    if (state.faction && state.playerName) {
        showUI();
        document.getElementById('content-overlay').style.display = 'none';
        const center = getMapCenter();
        document.getElementById('planet-container').style.left = center.x + 'px';
        document.getElementById('planet-container').style.top = center.y + 'px';
        parkShipOnPlanet();
        generateObjects();
        updateHangar();
        updateLeaderboard();
        updateVipWindow();
        updateBattlePassWindow();
        checkSeason();
    } else if (state.playerName) {
        showWindow('faction');
    } else {
        showWindow('start');
    }
}

document.addEventListener('DOMContentLoaded', init);
</script>
