<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Space Dream</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap');
        
        * {
            margin: 0; padding: 0; box-sizing: border-box;
        }
        
        body { 
            background: #000; color: #00ff00; 
            font-family: 'Press Start 2P', monospace; 
            user-select: none; -webkit-user-select: none;
            overflow: hidden; height: 100dvh; width: 100dvw; position: fixed;
        }
        
        .stars-layer {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none; z-index: 0;
            background: radial-gradient(ellipse at 50% 50%, #010310 0%, #000008 60%, #000 100%);
        }
        
        .star {
            position: absolute; background: #fff; border-radius: 50%;
            animation: twinkle var(--duration) infinite; animation-delay: var(--delay);
        }
        .star.bright { background: #ccddff; box-shadow: 0 0 3px #8899cc; }
        .star.medium { background: #8899bb; }
        .star.dim { background: #556677; }
        .star.tiny { background: #334455; }
        
        @keyframes twinkle {
            0%, 100% { opacity: 0.1; transform: scale(0.8); }
            50% { opacity: 0.9; transform: scale(1.3); }
        }
        
        @keyframes rotate {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }
        
        @keyframes orbitAnim {
            from { transform: rotate(0deg) translateX(110px) rotate(0deg); }
            to { transform: rotate(360deg) translateX(110px) rotate(-360deg); }
        }
        
        @keyframes slideUp {
            from { transform: translateY(100%); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }
        
        @keyframes lootPopup {
            0% { opacity: 0; transform: translate(-50%, 0); }
            20% { opacity: 1; transform: translate(-50%, -35px); }
            100% { opacity: 0; transform: translate(-50%, -90px); }
        }
        
        @keyframes engineGlow {
            from { filter: drop-shadow(0 0 4px #5588bb); }
            to { filter: drop-shadow(0 0 10px #77aadd); }
        }
        
        .app-container { position: relative; width: 100%; height: 100dvh; display: flex; flex-direction: column; }
        
        .background-map {
            position: fixed; top: 0; left: 0; width: 100%; height: calc(100dvh - 80px);
            z-index: 1; pointer-events: none;
        }
        
        .galaxy-bg {
            position: relative; width: 100%; height: 100%; overflow: hidden; background: transparent;
        }
        
        .planet-container {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); z-index: 2;
        }
        
        .pixel-planet {
            width: 130px; height: 130px; position: relative; animation: rotate 60s linear infinite;
        }
        
        .pixel-planet-inner {
            width: 100%; height: 100%; border-radius: 50%;
            background: radial-gradient(circle at 32% 32%, #667788 0%, #445566 12%, #223344 28%, #111a28 50%, #080d15 70%, #030508 88%, #010203 100%);
            box-shadow: 0 0 25px rgba(70,90,120,0.2), 0 0 50px rgba(50,70,100,0.08), inset 0 -12px 24px rgba(0,0,0,0.7);
            border: 1px solid #1a2530; position: relative; overflow: hidden;
        }
        
        .player-orbit {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); z-index: 5; pointer-events: none;
        }
        .player-on-orbit { position: absolute; animation: orbitAnim 22s linear infinite; }
        
        .pixel-player-ship {
            width: 38px; height: 44px; position: relative; animation: engineGlow 2s infinite alternate;
        }
        .ship-saucer { width: 55%; height: 22%; background: linear-gradient(180deg, #8899aa 0%, #667788 40%, #445566 100%); position: absolute; top: 10%; left: 22%; border-radius: 50% 50% 40% 40%; border: 1px solid #556677; }
        .ship-neck { width: 16%; height: 18%; background: linear-gradient(180deg, #667788, #445566); position: absolute; top: 30%; left: 42%; }
        .ship-body { width: 38%; height: 35%; background: linear-gradient(180deg, #778899 0%, #556678 40%, #334455 100%); position: absolute; top: 46%; left: 31%; border-radius: 8px 8px 4px 4px; border: 1px solid #445566; }
        .ship-nacelle-l { width: 12%; height: 40%; background: linear-gradient(90deg, #667788, #445566); position: absolute; top: 40%; left: 16%; border-radius: 50% 50% 30% 30%; border: 1px solid #3a4a5a; }
        .ship-nacelle-r { width: 12%; height: 40%; background: linear-gradient(90deg, #667788, #445566); position: absolute; top: 40%; right: 16%; border-radius: 50% 50% 30% 30%; border: 1px solid #3a4a5a; }
        
        /* Простые стили объектов */
        .bg-object {
            position: absolute; z-index: 2; pointer-events: none; transition: opacity 0.3s; transform: translate(-50%, -50%);
            font-size: 28px; cursor: pointer;
        }
        
        .top-panel {
            position: fixed; top: 0; left: 0; right: 0; height: 50px; display: flex;
            justify-content: space-between; align-items: center; padding: 5px 10px; z-index: 100; pointer-events: none;
        }
        .back-btn {
            width: 34px; height: 34px; background: rgba(0,20,0,0.9); border: 2px solid #00aa44; color: #00dd55;
            font-size: 15px; cursor: pointer; display: flex; align-items: center; justify-content: center;
            font-family: 'Press Start 2P', monospace; pointer-events: all;
        }
        .spice-counter, .fuel-counter {
            background: rgba(0,0,0,0.85); border: 2px solid #bb9922; color: #bb9922;
            padding: 5px 8px; font-size: 8px; pointer-events: all; text-align: center; margin-left: 5px;
        }
        .fuel-counter { border-color: #4488ff; color: #4488ff; }
        
        .loot-feed {
            position: fixed; bottom: 85px; left: 8px; right: 8px; z-index: 90; pointer-events: none;
            text-align: center; min-height: 26px; display: none; align-items: center; justify-content: center; gap: 6px; flex-wrap: wrap;
        }
        .loot-item {
            font-family: 'Press Start 2P', monospace; font-size: 7px; color: #bb9922;
            animation: fadeInOut 3s ease-in-out forwards; background: rgba(0,0,0,0.6); padding: 2px 5px;
        }
        @keyframes fadeInOut {
            0% { opacity: 0; transform: translateY(5px); } 20% { opacity: 1; transform: translateY(0); }
            80% { opacity: 1; } 100% { opacity: 0; transform: translateY(-5px); }
        }
        
        .content-overlay {
            position: fixed; top: 50px; left: 0; right: 0; bottom: 80px; z-index: 50;
            pointer-events: none; display: flex; align-items: center; justify-content: center;
        }
        .content-overlay > * { pointer-events: all; }
        
        .bottom-panel {
            position: fixed; bottom: 0; left: 0; right: 0; height: 80px;
            background: rgba(2,2,10,0.96); border-top: 2px solid #009944;
            display: flex; justify-content: space-around; align-items: center; z-index: 100; padding: 4px;
        }
        .nav-btn {
            background: #040c04; border: 2px solid #006633; color: #00aa44; padding: 5px 8px;
            font-family: 'Press Start 2P', monospace; font-size: 6px; cursor: pointer; transition: all 0.2s;
            text-align: center; flex: 1; margin: 0 2px; max-width: 90px;
        }
        .nav-btn.active { background: #061806; border-color: #bb9922; }
        
        .window {
            background: rgba(2,2,14,0.94); border: 2px solid #009944; padding: 14px;
            max-width: 300px; width: 88%; max-height: 50vh; overflow-y: auto; animation: slideUp 0.3s ease-out;
        }
        .input-field {
            width: 100%; padding: 8px; margin: 6px 0; background: #040410; border: 2px solid #009944;
            color: #00bb44; font-family: 'Press Start 2P', monospace; font-size: 8px; text-align: center;
        }
        .btn {
            width: 100%; padding: 8px; margin: 5px 0; background: #040c04; border: 2px solid #009944;
            color: #00bb44; font-family: 'Press Start 2P', monospace; font-size: 8px; cursor: pointer; transition: all 0.2s;
        }
        .btn:disabled { background: #161616; color: #333; border-color: #333; cursor: not-allowed; }
        
        .hidden { display: none !important; }
    </style>
</head>
<body>
    <div class="stars-layer" id="stars-layer"></div>
    <div class="app-container">
        <div class="background-map" id="background-map">
            <div class="galaxy-bg" id="galaxy-bg">
                <div class="planet-container" id="planet-container">
                    <div class="pixel-planet"><div class="pixel-planet-inner"></div></div>
                </div>
                <div class="player-orbit" id="player-orbit">
                    <div class="player-on-orbit" id="player-on-orbit"></div>
                </div>
            </div>
        </div>
        <div class="top-panel">
            <button class="back-btn hidden" id="back-btn" onclick="goBack()">←</button>
            <div style="display:flex; gap:5px;">
                <div class="fuel-counter hidden" id="fuel-counter">⛽ <span id="fuel-value">100</span></div>
                <div class="spice-counter hidden" id="spice-counter">💎 <span id="spice-value">0</span>/50</div>
            </div>
        </div>
        <div class="loot-feed" id="loot-feed"></div>
        <div class="content-overlay" id="content-overlay">
            <div class="window" id="window-start">
                <div class="title">SPACE DREAM</div>
                <input type="text" class="input-field" id="input-player-name" placeholder="ИМЯ ИГРОКА" maxlength="12">
                <button class="btn" onclick="setPlayerName()">ДАЛЕЕ</button>
            </div>
            <div class="window hidden" id="window-faction">
                <div class="title">ВЫБЕРИ ФРАКЦИЮ</div>
                <button class="btn" style="border-color:#4488aa;color:#4488aa" onclick="selectFaction('Конфедерация','#4488aa','shield')">◆ КОНФЕДЕРАЦИЯ<br><small>Щит +50%</small></button>
                <button class="btn" style="border-color:#aa5533;color:#aa5533" onclick="selectFaction('Повстанцы','#aa5533','weapon')">◆ ПОВСТАНЦЫ<br><small>Урон +50%</small></button>
                <button class="btn" style="border-color:#aa9933;color:#aa9933" onclick="selectFaction('Торговая гильдия','#aa9933','mining')">◆ ТОРГОВАЯ ГИЛЬДИЯ<br><small>Добыча +50%</small></button>
            </div>
            <div class="window hidden" id="window-ship">
                <div class="title">ВЫБЕРИ КОРАБЛЬ</div>
                <div id="ship-selection" style="display:flex;gap:8px;justify-content:center;margin:10px 0"></div>
                <input type="text" class="input-field" id="input-ship-name" placeholder="ИМЯ КОРАБЛЯ" maxlength="14">
                <button class="btn" id="confirm-ship-btn" onclick="confirmShip()">ПОДТВЕРДИТЬ</button>
            </div>
            <div class="window hidden" id="window-hangar">
                <div class="title">АНГАР</div>
                <div id="hangar-resources" style="display:flex;gap:8px;flex-wrap:wrap;justify-content:center;margin:8px 0;font-size:7px;"></div>
                <div id="upgrades-list"></div>
            </div>
            <div class="window hidden" id="window-pvp">
                <div class="title">PvP АРЕНА</div>
                <div style="text-align:center;font-size:8px;color:#aa9933" id="pvp-timer">15</div>
                <div style="text-align:center;font-size:6px" id="pvp-status">Нажмите НАЙТИ БОЙ</div>
                <button class="btn" onclick="searchPvP()">НАЙТИ БОЙ</button>
                <div class="leaderboard" id="leaderboard" style="max-height:120px;overflow-y:auto;font-size:6px;"></div>
            </div>
        </div>
        <div class="bottom-panel hidden" id="bottom-panel">
            <button class="nav-btn active" id="nav-map" onclick="switchTab('map')">🌌 КАРТА</button>
            <button class="nav-btn" id="nav-hangar" onclick="switchTab('hangar')">🚀 АНГАР</button>
            <button class="nav-btn" id="nav-pvp" onclick="switchTab('pvp')">⚔️ PvP</button>
            <button class="nav-btn" id="nav-vip" onclick="switchTab('vip')">⭐ VIP</button>
        </div>
    </div>
    <script>
        // СОСТОЯНИЕ
        window.playerName = localStorage.getItem('sd_player_name') || '';
        window.shipName = localStorage.getItem('sd_ship_name') || '';
        window.frac = localStorage.getItem('sd_frac') || null;
        window.fracColor = localStorage.getItem('sd_color') || '#00aa44';
        window.fracBonus = localStorage.getItem('sd_bonus') || null;
        window.selectedShipIndex = parseInt(localStorage.getItem('sd_ship_index')) || 0;
        
        // Ресурсы
        window.resources = {
            gold: parseInt(localStorage.getItem('sd_gold')) || 0,
            parts: parseInt(localStorage.getItem('sd_parts')) || 0,
            spice: parseInt(localStorage.getItem('sd_spice')) || 0,
            fuel: parseInt(localStorage.getItem('sd_fuel')) || 100
        };
        window.maxFuel = 100;
        window.fuelRegenRate = 1; // единиц в 10 секунд
        window.freeRefuelUsed = localStorage.getItem('sd_free_refuel') === 'true';
        
        window.spiceData = JSON.parse(localStorage.getItem('sd_spice_data')) || { date: '', collected: 0 };
        const today = new Date().toDateString();
        if (window.spiceData.date !== today) {
            window.spiceData = { date: today, collected: 0 };
            localStorage.setItem('sd_spice_data', JSON.stringify(window.spiceData));
        }
        
        window.vipLevel = parseInt(localStorage.getItem('sd_vip')) || 0; // 0-4
        const vipMultipliers = [1, 1.5, 3, 5, 7.5];
        window.getMultiplier = () => vipMultipliers[window.vipLevel] || 1;
        
        window.pvpScore = parseInt(localStorage.getItem('sd_pvp_score')) || 0;
        window.leaderboard = JSON.parse(localStorage.getItem('sd_leaderboard')) || [];
        
        window.upgrades = {
            shield: parseInt(localStorage.getItem('sd_upg_shield')) || 1,
            damage: parseInt(localStorage.getItem('sd_upg_damage')) || 0,
            speed: parseInt(localStorage.getItem('sd_upg_speed')) || 0,
            crit: parseInt(localStorage.getItem('sd_upg_crit')) || 0
        };
        
        window.galaxyObjects = [];
        window.isShipFlying = false;
        window.pvpInterval = null;
        window.pvpTimerInterval = null;
        window.currentTab = 'map';
        window.tempFaction = null;
        window.tempShipIndex = null;
        
        // Функции отрисовки корабля (упрощённо)
        function createPixelShip(scale=0.5) {
            const div = document.createElement('div');
            div.className = 'pixel-player-ship';
            div.style.transform = `scale(${scale})`;
            div.innerHTML = '<div class="ship-saucer"></div><div class="ship-neck"></div><div class="ship-body"></div><div class="ship-nacelle-l"></div><div class="ship-nacelle-r"></div>';
            return div;
        }
        
        function createAsteroid() { return '🪨'; }
        function createPirate() { return '👾'; }
        function createWreck() { return '🛸'; }
        
        window.saveAll = function() {
            Object.keys(window.resources).forEach(k => localStorage.setItem('sd_' + k, window.resources[k]));
            localStorage.setItem('sd_spice_data', JSON.stringify(window.spiceData));
            localStorage.setItem('sd_free_refuel', window.freeRefuelUsed);
            localStorage.setItem('sd_vip', window.vipLevel);
            localStorage.setItem('sd_pvp_score', window.pvpScore);
            localStorage.setItem('sd_leaderboard', JSON.stringify(window.leaderboard));
            localStorage.setItem('sd_player_name', window.playerName);
            localStorage.setItem('sd_ship_name', window.shipName);
        };
        
        window.showLoot = function(type, amount) {
            const feed = document.getElementById('loot-feed');
            const item = document.createElement('span');
            item.className = 'loot-item';
            item.innerText = `+${amount} ${type}`;
            feed.appendChild(item);
            setTimeout(() => item.remove(), 3000);
        };
        
        window.showWindow = function(id) {
            document.querySelectorAll('.window').forEach(w => w.classList.add('hidden'));
            const win = document.getElementById('window-' + id);
            if (win) win.classList.remove('hidden');
        };
        
        window.showUI = function() {
            document.getElementById('back-btn').classList.remove('hidden');
            document.getElementById('fuel-counter').classList.remove('hidden');
            document.getElementById('spice-counter').classList.remove('hidden');
            document.getElementById('bottom-panel').classList.remove('hidden');
            updateFuelDisplay();
            updateSpiceDisplay();
        };
        
        function updateFuelDisplay() {
            document.getElementById('fuel-value').innerText = Math.floor(window.resources.fuel);
        }
        
        function updateSpiceDisplay() {
            document.getElementById('spice-value').innerText = window.spiceData.collected;
        }
        
        // Генерация фона
        function createBackground() {
            const layer = document.getElementById('stars-layer');
            for (let i = 0; i < 400; i++) {
                const s = document.createElement('div');
                s.className = 'star';
                const r = Math.random();
                if (r < 0.1) s.classList.add('bright');
                else if (r < 0.3) s.classList.add('medium');
                else if (r < 0.6) s.classList.add('dim');
                else s.classList.add('tiny');
                s.style.left = Math.random() * 100 + '%';
                s.style.top = Math.random() * 100 + '%';
                const sz = Math.random() < 0.08 ? 2.5 : (Math.random() < 0.2 ? 1.8 : (Math.random() < 0.5 ? 1.2 : 0.6));
                s.style.width = sz + 'px';
                s.style.height = sz + 'px';
                s.style.setProperty('--duration', (Math.random() * 3 + 1.5) + 's');
                s.style.setProperty('--delay', Math.random() * 2 + 's');
                layer.appendChild(s);
            }
        }
        createBackground();
        
        function getMapCenter() {
            const bg = document.getElementById('galaxy-bg');
            return { x: bg.offsetWidth / 2, y: bg.offsetHeight / 2 };
        }
        
        function createOrbitShip() {
            const orbit = document.getElementById('player-on-orbit');
            orbit.innerHTML = '';
            orbit.appendChild(createPixelShip(0.45));
            orbit.style.display = 'block';
        }
        
        // Генерация 9 объектов (3 астероида, 3 пирата, 3 обломка) в случайных местах
        window.generateObjects = function() {
            const bg = document.getElementById('galaxy-bg');
            bg.querySelectorAll('.bg-object').forEach(e => e.remove());
            window.galaxyObjects = [];
            const center = getMapCenter();
            const types = ['asteroid', 'asteroid', 'asteroid', 'pirate', 'pirate', 'pirate', 'wreck', 'wreck', 'wreck'];
            types.sort(() => Math.random() - 0.5);
            types.forEach(type => {
                const angle = Math.random() * Math.PI * 2;
                const distance = 120 + Math.random() * 80;
                const x = center.x + Math.cos(angle) * distance;
                const y = center.y + Math.sin(angle) * distance;
                const obj = { type, x, y, element: null };
                const div = document.createElement('div');
                div.className = 'bg-object';
                div.innerText = type === 'asteroid' ? createAsteroid() : type === 'pirate' ? createPirate() : createWreck();
                div.style.left = x + 'px';
                div.style.top = y + 'px';
                div.style.pointerEvents = 'all';
                div.onclick = (e) => {
                    e.stopPropagation();
                    if (window.currentTab === 'map' && !window.isShipFlying && window.resources.fuel >= 20) {
                        window.flyToObject(obj, div);
                    }
                };
                bg.appendChild(div);
                obj.element = div;
                window.galaxyObjects.push(obj);
            });
        };
        
        window.flyToObject = function(obj, element) {
            if (window.isShipFlying || window.resources.fuel < 20) return;
            window.isShipFlying = true;
            window.resources.fuel -= 20;
            saveAll();
            updateFuelDisplay();
            
            const center = getMapCenter();
            const bg = document.getElementById('galaxy-bg');
            document.getElementById('player-on-orbit').style.display = 'none';
            
            const shipW = document.createElement('div');
            shipW.className = 'flying-ship-anim';
            shipW.style.position = 'absolute';
            shipW.style.left = center.x + 'px';
            shipW.style.top = center.y + 'px';
            shipW.appendChild(createPixelShip(0.45));
            bg.appendChild(shipW);
            
            // Полет 5 секунд туда
            shipW.style.transition = 'all 5s cubic-bezier(0.25,0.1,0.25,1)';
            requestAnimationFrame(() => {
                shipW.style.left = obj.x + 'px';
                shipW.style.top = obj.y + 'px';
                shipW.style.transform = 'translate(-50%, -50%) scale(0.5)';
            });
            
            setTimeout(() => {
                // Добыча/бой
                const mult = window.getMultiplier();
                let loot = null;
                if (obj.type === 'asteroid') {
                    const r = Math.random();
                    if (r < 0.5) { // топливо
                        const fuelAmount = Math.floor(5 * mult);
                        window.resources.fuel = Math.min(window.maxFuel, window.resources.fuel + fuelAmount);
                        loot = { type: '⛽ Топливо', amount: fuelAmount };
                    } else if (r < 0.9) { // спайс
                        if (window.spiceData.collected < 50) {
                            window.spiceData.collected++;
                            window.resources.spice++;
                            loot = { type: '💎 Спайс', amount: 1 };
                        }
                    }
                } else if (obj.type === 'pirate') {
                    const goldAmount = Math.floor(10 * mult);
                    window.resources.gold += goldAmount;
                    loot = { type: '🪙 Золото', amount: goldAmount };
                } else if (obj.type === 'wreck') {
                    const partsAmount = Math.floor(3 * mult);
                    window.resources.parts += partsAmount;
                    const fuelRefund = Math.floor(3 * mult);
                    window.resources.fuel = Math.min(window.maxFuel, window.resources.fuel + fuelRefund);
                    loot = { type: '🔧 Детали', amount: partsAmount };
                    window.showLoot('⛽ Топливо', fuelRefund);
                }
                if (loot) window.showLoot(loot.type, loot.amount);
                saveAll();
                updateFuelDisplay();
                updateSpiceDisplay();
                
                element.style.opacity = '0';
                setTimeout(() => element.remove(), 300);
                
                // Возврат 5 секунд
                shipW.style.transition = 'all 5s cubic-bezier(0.25,0.1,0.25,1)';
                shipW.style.left = center.x + 'px';
                shipW.style.top = center.y + 'px';
                shipW.style.transform = 'translate(-50%, -50%) scale(0.45)';
                
                setTimeout(() => {
                    shipW.remove();
                    window.galaxyObjects = window.galaxyObjects.filter(o => o !== obj);
                    window.isShipFlying = false;
                    createOrbitShip();
                    if (document.querySelectorAll('.bg-object').length === 0) {
                        window.generateObjects();
                    }
                }, 5000);
            }, 5000);
        };
        
        // Регенерация топлива
        setInterval(() => {
            if (window.resources.fuel < window.maxFuel) {
                window.resources.fuel = Math.min(window.maxFuel, window.resources.fuel + window.fuelRegenRate);
                saveAll();
                updateFuelDisplay();
            }
        }, 10000);
        
        // Бесплатное восстановление топлива (один раз)
        window.freeRefuel = function() {
            if (window.freeRefuelUsed) return;
            window.resources.fuel = window.maxFuel;
            window.freeRefuelUsed = true;
            saveAll();
            updateFuelDisplay();
        };
        
        // Инициализация
        window.setPlayerName = function() {
            const name = document.getElementById('input-player-name').value.trim();
            if (name.length < 2) return alert('Минимум 2 символа');
            window.playerName = name;
            saveAll();
            window.showWindow('faction');
        };
        
        window.selectFaction = function(name, color, bonus) {
            window.tempFaction = { name, color, bonus };
            const container = document.getElementById('ship-selection');
            container.innerHTML = '';
            for (let i = 0; i < 3; i++) {
                const card = document.createElement('div');
                card.style.cssText = 'cursor:pointer;padding:6px;border:2px solid #009944;text-align:center;';
                card.appendChild(createPixelShip(0.6));
                card.onclick = () => {
                    window.tempShipIndex = i;
                    container.querySelectorAll('div').forEach(d => d.style.borderColor = '#009944');
                    card.style.borderColor = '#aa9933';
                    document.getElementById('confirm-ship-btn').disabled = false;
                };
                container.appendChild(card);
            }
            document.getElementById('confirm-ship-btn').disabled = true;
            window.showWindow('ship');
        };
        
        window.confirmShip = function() {
            const name = document.getElementById('input-ship-name').value.trim();
            if (window.tempShipIndex === null || name.length < 2) return alert('Выберите корабль и введите имя');
            window.frac = window.tempFaction.name;
            window.fracColor = window.tempFaction.color;
            window.fracBonus = window.tempFaction.bonus;
            window.selectedShipIndex = window.tempShipIndex;
            window.shipName = name;
            ['sd_frac','sd_color','sd_bonus','sd_ship_index','sd_ship_name'].forEach(k => localStorage.setItem(k, window[k]));
            saveAll();
            window.showUI();
            document.getElementById('content-overlay').style.display = 'none';
            const center = getMapCenter();
            document.getElementById('planet-container').style.left = center.x + 'px';
            document.getElementById('planet-container').style.top = center.y + 'px';
            createOrbitShip();
            window.generateObjects();
            updateHangar();
            updateLeaderboard();
        };
        
        window.switchTab = function(tab) {
            window.currentTab = tab;
            document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
            document.getElementById('nav-' + tab).classList.add('active');
            document.querySelectorAll('.bg-object').forEach(o => o.style.display = tab === 'map' ? 'block' : 'none');
            document.getElementById('loot-feed').style.display = tab === 'map' ? 'flex' : 'none';
            if (tab === 'map') {
                document.getElementById('content-overlay').style.display = 'none';
            } else {
                document.getElementById('content-overlay').style.display = 'flex';
                if (tab === 'hangar') {
                    window.showWindow('hangar');
                    updateHangar();
                } else if (tab === 'pvp') {
                    window.showWindow('pvp');
                    updateLeaderboard();
                } else if (tab === 'vip') {
                    window.showWindow('vip');
                    updateVipWindow();
                }
            }
        };
        
        function updateHangar() {
            const resDiv = document.getElementById('hangar-resources');
            resDiv.innerHTML = `
                <span>🪙 ${window.resources.gold}</span>
                <span>🔧 ${window.resources.parts}</span>
                <span>💎 ${window.resources.spice}</span>
            `;
            const list = document.getElementById('upgrades-list');
            const types = [
                { key: 'shield', name: 'Щит', cost: 5 },
                { key: 'damage', name: 'Урон', cost: 5 },
                { key: 'speed', name: 'Скорость', cost: 5 },
                { key: 'crit', name: 'Крит', cost: 5 }
            ];
            list.innerHTML = types.map(t => {
                const level = window.upgrades[t.key];
                const cost = t.cost * (level + 1);
                const canBuy = window.resources.parts >= cost;
                return `<div style="display:flex;justify-content:space-between;padding:4px;border:1px solid #009944;margin:2px 0;">
                    <span>${t.name} Ур.${level}</span>
                    <button class="btn" style="width:auto;padding:2px 6px;" ${canBuy ? '' : 'disabled'} onclick="buyUpgrade('${t.key}')">${cost}🔧</button>
                </div>`;
            }).join('');
        }
        
        window.buyUpgrade = function(type) {
            const cost = 5 * (window.upgrades[type] + 1);
            if (window.resources.parts >= cost) {
                window.resources.parts -= cost;
                window.upgrades[type]++;
                localStorage.setItem('sd_upg_' + type, window.upgrades[type]);
                saveAll();
                updateHangar();
            }
        };
        
        function updateVipWindow() {
            const win = document.getElementById('window-vip');
            if (!win) return;
            win.innerHTML = `
                <div class="title">VIP СТАТУС</div>
                <p>Уровень: ${window.vipLevel}</p>
                <p>Множитель добычи: x${window.getMultiplier()}</p>
                <button class="btn" onclick="upgradeVip()">Улучшить VIP</button>
            `;
        }
        
        window.upgradeVip = function() {
            if (window.vipLevel < 4) {
                window.vipLevel++;
                localStorage.setItem('sd_vip', window.vipLevel);
                saveAll();
                updateVipWindow();
            }
        };
        
        // PvP (упрощённый)
        window.searchPvP = function() {
            if (window.pvpInterval) return;
            let timer = 15;
            document.getElementById('pvp-timer').innerText = timer;
            document.getElementById('pvp-status').innerText = 'Бой...';
            window.pvpTimerInterval = setInterval(() => {
                timer--;
                document.getElementById('pvp-timer').innerText = timer;
                if (timer <= 0) {
                    clearInterval(window.pvpTimerInterval);
                    const win = Math.random() > 0.5;
                    document.getElementById('pvp-status').innerText = win ? 'ПОБЕДА! +15' : 'ПОРАЖЕНИЕ -12';
                    window.pvpScore += win ? 15 : -12;
                    if (window.pvpScore < 0) window.pvpScore = 0;
                    saveAll();
                    updateLeaderboard();
                    window.pvpTimerInterval = null;
                }
            }, 1000);
        };
        
        function updateLeaderboard() {
            const idx = window.leaderboard.findIndex(p => p.name === window.playerName);
            if (idx >= 0) window.leaderboard[idx].score = window.pvpScore;
            else if (window.playerName) window.leaderboard.push({ name: window.playerName, score: window.pvpScore });
            window.leaderboard.sort((a,b) => b.score - a.score);
            window.leaderboard = window.leaderboard.slice(0, 15);
            const list = document.getElementById('leaderboard');
            if (list) {
                list.innerHTML = '<div style="color:#aa9933">ТОП 15</div>' + 
                    window.leaderboard.map((p,i) => `<div>#${i+1} ${p.name}: ${p.score}</div>`).join('');
            }
            saveAll();
        };
        
        window.goBack = () => { if (window.currentTab !== 'map') window.switchTab('map'); };
        
        // Старт
        if (window.playerName && window.frac) {
            window.showUI();
            document.getElementById('content-overlay').style.display = 'none';
            const center = getMapCenter();
            document.getElementById('planet-container').style.left = center.x + 'px';
            document.getElementById('planet-container').style.top = center.y + 'px';
            createOrbitShip();
            window.generateObjects();
            updateHangar();
            updateLeaderboard();
        } else if (window.playerName) {
            window.showWindow('faction');
        } else {
            window.showWindow('start');
        }
    </script>
</body>
</html>
