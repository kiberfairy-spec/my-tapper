<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Space Dream</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap');
        
        * {
            image-rendering: pixelated;
            -ms-interpolation-mode: nearest-neighbor;
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body { 
            background: #0a0a2e;
            color: #00ff00; 
            font-family: 'Press Start 2P', monospace; 
            user-select: none; 
            -webkit-user-select: none;
            overflow: hidden;
            height: 100vh;
            width: 100vw;
            position: fixed;
        }
        
        .stars-layer {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 0;
        }
        
        .star {
            position: absolute;
            background: #fff;
            border-radius: 50%;
            animation: twinkle var(--duration) infinite;
            animation-delay: var(--delay);
        }
        
        .shooting-star {
            position: absolute;
            width: 2px;
            height: 80px;
            background: linear-gradient(to bottom, rgba(255,255,255,0.8), transparent);
            animation: shoot var(--travel) linear infinite;
            animation-delay: var(--sdelay);
            opacity: 0;
        }
        
        @keyframes twinkle {
            0%, 100% { opacity: 0.2; transform: scale(1); }
            50% { opacity: 1; transform: scale(1.5); }
        }
        
        @keyframes shoot {
            0% { transform: translate(0, 0) rotate(-45deg); opacity: 0; }
            5% { opacity: 1; }
            15% { opacity: 0; transform: translate(-300px, 300px) rotate(-45deg); }
            100% { opacity: 0; transform: translate(-300px, 300px) rotate(-45deg); }
        }
        
        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-8px); }
        }
        
        @keyframes rotate {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }
        
        @keyframes slideUp {
            from { transform: translateY(100%); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }
        
        @keyframes fadeInOut {
            0% { opacity: 0; transform: translateY(10px); }
            20% { opacity: 1; transform: translateY(0); }
            80% { opacity: 1; transform: translateY(0); }
            100% { opacity: 0; transform: translateY(-10px); }
        }

        .app-container {
            position: relative;
            width: 100%;
            height: 100vh;
            display: flex;
            flex-direction: column;
        }

        .background-map {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: calc(100% - 80px);
            z-index: 1;
            pointer-events: none;
        }

        .galaxy-bg {
            position: relative;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at center, #1a1a4e 0%, #0a0a2e 70%);
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .planet-orbit {
            position: relative;
            width: 300px;
            height: 300px;
        }

        .main-planet {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 80px;
            z-index: 2;
            animation: rotate 20s linear infinite;
        }
        
        .planet-label {
            position: absolute;
            top: calc(50% + 50px);
            left: 50%;
            transform: translateX(-50%);
            font-size: 10px;
            color: #00ffff;
            text-shadow: 0 0 10px #00ffff;
            z-index: 3;
            white-space: nowrap;
        }

        .bg-object {
            position: absolute;
            font-size: 25px;
            z-index: 2;
            pointer-events: none;
            transition: opacity 0.3s;
        }
        
        .bg-object[data-type="asteroid"] { filter: drop-shadow(0 0 6px rgba(139, 115, 85, 0.6)); }
        .bg-object[data-type="pirate"] { filter: drop-shadow(0 0 6px rgba(255, 68, 68, 0.6)); }

        .flying-ship-anim {
            position: absolute;
            font-size: 28px;
            z-index: 10;
            pointer-events: none;
            filter: drop-shadow(0 0 10px rgba(0, 255, 0, 0.8));
        }

        .top-panel {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            height: 50px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 5px 15px;
            z-index: 100;
            pointer-events: none;
        }

        .back-btn {
            width: 40px;
            height: 40px;
            background: rgba(0, 51, 0, 0.9);
            border: 2px solid #00ff00;
            color: #00ff00;
            font-size: 20px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Press Start 2P', monospace;
            pointer-events: all;
            transition: all 0.2s;
        }

        .back-btn:hover { background: rgba(0, 68, 0, 0.9); box-shadow: 0 0 15px rgba(0, 255, 0, 0.5); }

        .spice-counter {
            background: rgba(0, 0, 0, 0.8);
            border: 2px solid #ffcc00;
            color: #ffcc00;
            padding: 8px 12px;
            font-size: 10px;
            pointer-events: all;
            text-align: center;
        }

        .dev-reset-btn {
            position: fixed;
            bottom: 90px;
            right: 10px;
            width: 30px;
            height: 30px;
            background: rgba(100, 0, 0, 0.7);
            border: 1px solid #ff4444;
            color: #ff4444;
            font-size: 12px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Press Start 2P', monospace;
            z-index: 200;
            pointer-events: all;
            border-radius: 50%;
            transition: all 0.2s;
        }

        .dev-reset-btn:hover { background: rgba(150, 0, 0, 0.9); box-shadow: 0 0 10px rgba(255, 0, 0, 0.5); }

        /* СТРОКА РЕСУРСОВ */
        .loot-feed {
            position: fixed;
            bottom: 85px;
            left: 10px;
            right: 10px;
            z-index: 90;
            pointer-events: none;
            text-align: center;
            min-height: 30px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            flex-wrap: wrap;
        }
        
        .loot-item {
            font-family: 'Press Start 2P', monospace;
            font-size: 9px;
            color: #ffcc00;
            text-shadow: 0 0 8px rgba(255, 204, 0, 0.6);
            animation: fadeInOut 3s ease-in-out forwards;
            background: rgba(0,0,0,0.5);
            padding: 4px 8px;
            border-radius: 4px;
            white-space: nowrap;
        }
        
        .loot-item.spice-loot {
            color: #ff66ff;
            text-shadow: 0 0 12px rgba(255, 102, 255, 0.8);
            font-size: 11px;
        }

        .content-overlay {
            position: fixed;
            top: 50px;
            left: 0;
            right: 0;
            bottom: 80px;
            z-index: 50;
            pointer-events: none;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .content-overlay > * { pointer-events: all; }

        .bottom-panel {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            height: 80px;
            background: rgba(10, 10, 46, 0.95);
            border-top: 2px solid #00ff00;
            display: flex;
            justify-content: space-around;
            align-items: center;
            z-index: 100;
            padding: 5px;
        }

        .nav-btn {
            background: #003300;
            border: 2px solid #00ff00;
            color: #00ff00;
            padding: 8px 12px;
            font-family: 'Press Start 2P', monospace;
            font-size: 8px;
            cursor: pointer;
            transition: all 0.2s;
            text-align: center;
            flex: 1;
            margin: 0 3px;
            max-width: 100px;
        }

        .nav-btn:hover { background: #004400; box-shadow: 0 0 10px rgba(0, 255, 0, 0.5); }
        .nav-btn.active { background: #006600; border-color: #ffcc00; box-shadow: 0 0 20px rgba(255, 204, 0, 0.5); }
        .nav-btn .nav-icon { font-size: 20px; display: block; margin-bottom: 3px; }

        .window {
            background: rgba(10, 10, 46, 0.92);
            border: 2px solid #00ff00;
            padding: 20px;
            max-width: 350px;
            width: 90%;
            max-height: 60vh;
            overflow-y: auto;
            animation: slideUp 0.3s ease-out;
        }

        .input-field {
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            background: #0a0a2e;
            border: 2px solid #00ff00;
            color: #00ff00;
            font-family: 'Press Start 2P', monospace;
            font-size: 10px;
            text-align: center;
        }

        .btn {
            width: 100%;
            padding: 12px;
            margin: 8px 0;
            background: #003300;
            border: 2px solid #00ff00;
            color: #00ff00;
            font-family: 'Press Start 2P', monospace;
            font-size: 10px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .btn:hover { background: #004400; box-shadow: 0 0 15px rgba(0, 255, 0, 0.5); }
        .btn:disabled { background: #1a1a1a; color: #333; border-color: #333; cursor: not-allowed; }

        .title {
            font-size: 14px;
            color: #00ff00;
            margin-bottom: 15px;
            text-align: center;
            text-shadow: 2px 2px 0 #003300;
        }

        .pvp-arena-mini {
            background: rgba(0, 0, 0, 0.5);
            border: 2px solid #ff4444;
            padding: 15px;
            height: 130px;
            position: relative;
            display: flex;
            align-items: center;
            justify-content: space-around;
        }

        .pvp-ship { font-size: 35px; transition: all 0.3s; }
        .pvp-vs { font-size: 14px; color: #ff4444; }
        .pvp-hp { font-size: 8px; color: #ff4444; position: absolute; top: 5px; }

        .leaderboard {
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid #00ff00;
            padding: 10px;
            max-height: 180px;
            overflow-y: auto;
            font-size: 8px;
            text-align: left;
        }

        .leaderboard-item { display: flex; justify-content: space-between; padding: 4px 0; border-bottom: 1px solid rgba(0, 255, 0, 0.2); }
        .leaderboard-item .rank { color: #ffcc00; width: 30px; }
        .leaderboard-item .name { flex: 1; color: #00ff00; }
        .leaderboard-item .score { color: #00ffff; width: 50px; text-align: right; }

        .ship-display { font-size: 55px; text-align: center; margin: 10px 0; animation: float 3s ease-in-out infinite; }

        .resources-mini {
            display: flex;
            justify-content: space-around;
            flex-wrap: wrap;
            gap: 5px;
            margin: 10px 0;
            padding: 8px;
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid #00ff00;
        }

        .resource-mini-item { text-align: center; font-size: 7px; color: #00cc00; }
        .resource-mini-item .mini-icon { font-size: 16px; display: block; }
        .resource-mini-item .mini-value { color: #ffcc00; font-size: 8px; }

        .upgrade-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 8px;
            margin: 5px 0;
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid #00ff00;
        }

        .upgrade-info { font-size: 8px; text-align: left; }
        .upgrade-btn {
            background: #003300; color: #00ff00; border: 1px solid #00ff00;
            padding: 5px 10px; font-family: 'Press Start 2P', monospace;
            font-size: 7px; cursor: pointer;
        }
        .upgrade-btn:disabled { background: #1a1a1a; color: #333; border-color: #333; cursor: not-allowed; }

        .hidden { display: none !important; }
    </style>
</head>
<body>
    <div class="stars-layer" id="stars-layer"></div>

    <div class="app-container">
        <div class="background-map" id="background-map">
            <div class="galaxy-bg" id="galaxy-bg">
                <div class="planet-orbit" id="planet-orbit">
                    <div class="main-planet">🪐</div>
                    <div class="planet-label">ТАУ КИТА</div>
                </div>
            </div>
        </div>

        <div class="top-panel">
            <button class="back-btn hidden" id="back-btn" onclick="goBack()">←</button>
            <div></div>
            <div class="spice-counter hidden" id="spice-counter">
                💎 СПАЙС<br><span id="spice-value">0</span>/50
            </div>
        </div>

        <button class="dev-reset-btn hidden" id="dev-reset-btn" onclick="devReset()" title="Сброс">🔄</button>

        <!-- СТРОКА ДОБЫЧИ -->
        <div class="loot-feed" id="loot-feed"></div>

        <div class="content-overlay" id="content-overlay">
            <div class="window" id="window-start">
                <div class="title">SPACE DREAM</div>
                <input type="text" class="input-field" id="input-player-name" placeholder="ИМЯ ИГРОКА" maxlength="12">
                <button class="btn" onclick="setPlayerName()">ДАЛЕЕ</button>
            </div>

            <div class="window hidden" id="window-faction">
                <div class="title">ВЫБЕРИ ФРАКЦИЮ</div>
                <div class="btn" style="border-color:#0066ff; color:#0066ff;" onclick="selectFaction('Конфедерация', '#0066ff', 'shield')">🛡️ КОНФЕДЕРАЦИЯ<br><small>Щит +50%</small></div>
                <div class="btn" style="border-color:#ff6600; color:#ff6600;" onclick="selectFaction('Повстанцы', '#ff6600', 'weapon')">⚔️ ПОВСТАНЦЫ<br><small>Урон +50%</small></div>
                <div class="btn" style="border-color:#ffcc00; color:#ffcc00;" onclick="selectFaction('Торговая гильдия', '#ffcc00', 'mining')">💎 ТОРГОВАЯ ГИЛЬДИЯ<br><small>Добыча +50%</small></div>
            </div>

            <div class="window hidden" id="window-ship">
                <div class="title">ВЫБЕРИ КОРАБЛЬ</div>
                <div id="ship-selection" style="display:flex; gap:10px; justify-content:center; margin:15px 0;"></div>
                <input type="text" class="input-field" id="input-ship-name" placeholder="ИМЯ КОРАБЛЯ" maxlength="14">
                <button class="btn" id="confirm-ship-btn" onclick="confirmShip()">ПОДТВЕРДИТЬ</button>
            </div>

            <div class="window hidden" id="window-main"></div>

            <div class="window hidden" id="window-hangar">
                <div class="title">АНГАР</div>
                <div class="ship-display" id="hangar-ship">🚀</div>
                <div style="font-size:10px; text-align:center; margin-bottom:5px;" id="hangar-ship-name"></div>
                <div class="resources-mini" id="hangar-resources"></div>
                <div id="upgrades-list"></div>
            </div>

            <div class="window hidden" id="window-pvp">
                <div class="title">PvP АРЕНА</div>
                <div class="pvp-arena-mini">
                    <span class="pvp-ship" id="pvp-player-ship">🚀</span>
                    <span class="pvp-vs">VS</span>
                    <span class="pvp-ship" id="pvp-enemy-ship">👾</span>
                    <span class="pvp-hp" style="left:10px;" id="pvp-player-hp-text">HP:100</span>
                    <span class="pvp-hp" style="right:10px;" id="pvp-enemy-hp-text">HP:100</span>
                </div>
                <div style="text-align:center; font-size:10px; color:#ffcc00;" id="pvp-timer">15</div>
                <div style="text-align:center; font-size:8px;" id="pvp-status">Нажмите НАЙТИ БОЙ</div>
                <button class="btn" onclick="searchPvP()">🔍 НАЙТИ БОЙ</button>
                <div class="leaderboard" id="leaderboard"><div style="color:#ffcc00; margin-bottom:5px;">ТОП 15</div></div>
            </div>
        </div>

        <div class="bottom-panel hidden" id="bottom-panel">
            <button class="nav-btn active" id="nav-map" onclick="switchTab('map')"><span class="nav-icon">🌌</span>КАРТА</button>
            <button class="nav-btn" id="nav-hangar" onclick="switchTab('hangar')"><span class="nav-icon">🚀</span>АНГАР</button>
            <button class="nav-btn" id="nav-pvp" onclick="switchTab('pvp')"><span class="nav-icon">⚔️</span>PvP</button>
        </div>
    </div>

    <script>
        // ГЛОБАЛЬНЫЕ ПЕРЕМЕННЫЕ
        window.playerName = localStorage.getItem('sd_player_name') || '';
        window.shipName = localStorage.getItem('sd_ship_name') || '';
        window.frac = localStorage.getItem('sd_frac') || null;
        window.fracColor = localStorage.getItem('sd_color') || '#00ff00';
        window.fracBonus = localStorage.getItem('sd_bonus') || null;
        window.selectedShipIndex = parseInt(localStorage.getItem('sd_ship_index')) || 0;
        
        window.resources = {
            coins: parseInt(localStorage.getItem('sd_coins')) || 0,
            shieldParts: parseInt(localStorage.getItem('sd_shield')) || 0,
            weaponParts: parseInt(localStorage.getItem('sd_weapon')) || 0,
            speedParts: parseInt(localStorage.getItem('sd_speed')) || 0,
            critParts: parseInt(localStorage.getItem('sd_crit')) || 0,
            spice: parseInt(localStorage.getItem('sd_spice')) || 0
        };
        
        window.spiceData = JSON.parse(localStorage.getItem('sd_spice_data')) || { date: '', collected: 0 };
        const today = new Date().toDateString();
        if (window.spiceData.date !== today) {
            window.spiceData = { date: today, collected: 0 };
            localStorage.setItem('sd_spice_data', JSON.stringify(window.spiceData));
        }
        
        window.pvpScore = parseInt(localStorage.getItem('sd_pvp_score')) || 0;
        window.leaderboard = JSON.parse(localStorage.getItem('sd_leaderboard')) || [];
        
        window.upgrades = {
            shield: parseInt(localStorage.getItem('sd_upg_shield')) || 1,
            damage: parseInt(localStorage.getItem('sd_upg_damage')) || 0,
            speed: parseInt(localStorage.getItem('sd_upg_speed')) || 0,
            crit: parseInt(localStorage.getItem('sd_upg_crit')) || 0
        };
        
        window.galaxyObjects = [];
        window.isShipFlying = false;
        window.pvpInterval = null;
        window.pvpTimerInterval = null;
        window.currentTab = 'map';
        window.tempFaction = null;
        window.tempFactionColor = null;
        window.tempFactionBonus = null;
        window.tempShipIndex = null;

        const ships = {
            'Конфедерация': [{ emoji: '🛸', name: 'СТРАЖ-1' }, { emoji: '🛰️', name: 'СТРАЖ-2' }, { emoji: '🛡️', name: 'ЗАЩИТНИК' }],
            'Повстанцы': [{ emoji: '🚀', name: 'МСТИТЕЛЬ-1' }, { emoji: '💫', name: 'МСТИТЕЛЬ-2' }, { emoji: '⚡', name: 'РАЗРУШИТЕЛЬ' }],
            'Торговая гильдия': [{ emoji: '🚢', name: 'ТОРГОВЕЦ-1' }, { emoji: '🛳️', name: 'ТОРГОВЕЦ-2' }, { emoji: '🏗️', name: 'МАГНАТ' }]
        };

        const lootNames = { coins: '🪙 МОН', shieldParts: '🛡️ ЩИТ', weaponParts: '⚔️ ОРУД', speedParts: '⚡ СКОР', critParts: '🎯 КРИТ', spice: '💎 СПАЙС' };

        window.saveAll = function() {
            Object.keys(window.resources).forEach(k => localStorage.setItem('sd_' + k, window.resources[k]));
            localStorage.setItem('sd_spice_data', JSON.stringify(window.spiceData));
            localStorage.setItem('sd_pvp_score', window.pvpScore);
            localStorage.setItem('sd_leaderboard', JSON.stringify(window.leaderboard));
            localStorage.setItem('sd_player_name', window.playerName);
            localStorage.setItem('sd_ship_name', window.shipName);
        };

        window.getShipEmoji = function() {
            if (!window.frac || !ships[window.frac]) return '🚀';
            return ships[window.frac][window.selectedShipIndex].emoji;
        };

        window.showLoot = function(type) {
            if (!type) return;
            const feed = document.getElementById('loot-feed');
            const item = document.createElement('span');
            item.className = 'loot-item' + (type === 'spice' ? ' spice-loot' : '');
            item.innerText = '+' + lootNames[type];
            feed.appendChild(item);
            setTimeout(() => item.remove(), 3000);
        };

        window.showWindow = function(id) {
            document.querySelectorAll('.window').forEach(w => w.classList.add('hidden'));
            const win = document.getElementById('window-' + id);
            if (win) win.classList.remove('hidden');
        };

        window.showUI = function() {
            document.getElementById('back-btn').classList.remove('hidden');
            document.getElementById('spice-counter').classList.remove('hidden');
            document.getElementById('bottom-panel').classList.remove('hidden');
            document.getElementById('dev-reset-btn').classList.remove('hidden');
            document.getElementById('spice-value').innerText = window.spiceData.collected;
        };

        // ЗВЕЗДЫ
        function createStarLayers() {
            const container = document.getElementById('stars-layer');
            for (let i = 0; i < 200; i++) {
                const star = document.createElement('div');
                star.className = 'star';
                star.style.left = Math.random() * 100 + '%';
                star.style.top = Math.random() * 100 + '%';
                star.style.width = (Math.random() * 3 + 1) + 'px';
                star.style.height = star.style.width;
                star.style.setProperty('--duration', (Math.random() * 3 + 2) + 's');
                star.style.setProperty('--delay', Math.random() * 2 + 's');
                container.appendChild(star);
            }
            // Падающие звезды
            for (let i = 0; i < 8; i++) {
                const shooting = document.createElement('div');
                shooting.className = 'shooting-star';
                shooting.style.left = Math.random() * 80 + '%';
                shooting.style.top = Math.random() * 50 + '%';
                shooting.style.setProperty('--travel', (Math.random() * 4 + 4) + 's');
                shooting.style.setProperty('--sdelay', (Math.random() * 6) + 's');
                container.appendChild(shooting);
            }
        }
        createStarLayers();

        // ОБЪЕКТЫ ПО ЗОЛОТОМУ СЕЧЕНИЮ
        window.generateBackgroundObjects = function() {
            const orbit = document.getElementById('planet-orbit');
            orbit.querySelectorAll('.bg-object').forEach(el => el.remove());
            window.galaxyObjects = [];
            
            const phi = (1 + Math.sqrt(5)) / 2; // Золотое сечение
            const types = ['asteroid', 'asteroid', 'asteroid', 'pirate', 'pirate', 'pirate'];
            const shuffled = types.sort(() => Math.random() - 0.5);
            
            shuffled.forEach((type, i) => {
                const emojis = type === 'asteroid' ? ['🪨', '💎', '🪐', '☄️', '🌑', '🪨'] : ['🏴‍☠️', '💀', '👾', '👽', '🤖', '🐲'];
                const angle = (i * phi * Math.PI * 2) % (Math.PI * 2);
                const distance = 80 + (i * 20);
                
                const obj = {
                    type: type === 'asteroid' ? 'mining' : 'battle',
                    emoji: emojis[i],
                    angle: angle,
                    distance: distance,
                    element: null
                };
                
                const div = document.createElement('div');
                div.className = 'bg-object';
                div.setAttribute('data-type', type);
                div.innerText = obj.emoji;
                div.style.pointerEvents = 'all';
                div.style.cursor = 'pointer';
                div.onclick = function(e) {
                    e.stopPropagation();
                    if (window.currentTab === 'map' && !window.isShipFlying) window.flyToObject(obj, div);
                };
                
                orbit.appendChild(div);
                obj.element = div;
                window.galaxyObjects.push(obj);
            });
            
            positionObjects();
        };

        function positionObjects() {
            const orbit = document.getElementById('planet-orbit');
            const centerX = orbit.offsetWidth / 2;
            const centerY = orbit.offsetHeight / 2;
            
            window.galaxyObjects.forEach(obj => {
                const x = centerX + Math.cos(obj.angle) * obj.distance;
                const y = centerY + Math.sin(obj.angle) * obj.distance;
                obj.element.style.left = x + 'px';
                obj.element.style.top = y + 'px';
            });
        }

        // ПОЛЕТ КОРАБЛЯ
        window.flyToObject = function(obj, element) {
            if (window.isShipFlying) return;
            window.isShipFlying = true;
            
            const orbit = document.getElementById('planet-orbit');
            const centerX = orbit.offsetWidth / 2;
            const centerY = orbit.offsetHeight / 2;
            const targetX = centerX + Math.cos(obj.angle) * obj.distance;
            const targetY = centerY + Math.sin(obj.angle) * obj.distance;
            
            const ship = document.createElement('div');
            ship.className = 'flying-ship-anim';
            ship.innerText = window.getShipEmoji();
            ship.style.left = centerX + 'px';
            ship.style.top = centerY + 'px';
            ship.style.transform = 'translate(-50%, -50%)';
            orbit.appendChild(ship);
            
            // Полет к объекту (2.5 секунды)
            ship.style.transition = 'all 2.5s cubic-bezier(0.4, 0, 0.2, 1)';
            requestAnimationFrame(() => {
                ship.style.left = targetX + 'px';
                ship.style.top = targetY + 'px';
                ship.style.transform = 'translate(-50%, -50%) scale(0.6)';
            });
            
            // Остановка у объекта (3 секунды)
            setTimeout(() => {
                element.style.opacity = '0';
                const lootType = window.addLoot(window.getLoot());
                window.showLoot(lootType);
                
                // Возврат (2.5 секунды)
                setTimeout(() => {
                    ship.style.left = centerX + 'px';
                    ship.style.top = centerY + 'px';
                    ship.style.transform = 'translate(-50%, -50%) scale(1)';
                    
                    setTimeout(() => {
                        ship.remove();
                        element.remove();
                        window.galaxyObjects = window.galaxyObjects.filter(o => o !== obj);
                        window.isShipFlying = false;
                        window.updateSpiceDisplay();
                        
                        if (document.querySelectorAll('.bg-object').length === 0) {
                            window.generateBackgroundObjects();
                        }
                    }, 2500);
                }, 3000);
            }, 2500);
        };

        window.getLoot = function() {
            const roll = Math.random() * 100;
            if (roll < 40) return null;
            if (roll < 60) return 'coins';
            if (roll < 70) return 'shieldParts';
            if (roll < 80) return 'weaponParts';
            if (roll < 90) return 'speedParts';
            if (roll < 97) return 'critParts';
            return 'spice';
        };

        window.addLoot = function(type) {
            if (!type) return null;
            if (type === 'spice') {
                if (window.spiceData.collected >= 50) return null;
                window.spiceData.collected++;
                window.resources.spice++;
            } else {
                const amounts = { coins: Math.floor(Math.random() * 20) + 5, shieldParts: 1, weaponParts: 1, speedParts: 1, critParts: 1 };
                window.resources[type] += amounts[type];
            }
            window.saveAll();
            return type;
        };

        window.updateSpiceDisplay = function() {
            document.getElementById('spice-value').innerText = window.spiceData.collected;
        };

        // ДАЛЕЕ
        window.setPlayerName = function() {
            const name = document.getElementById('input-player-name').value.trim();
            if (name.length < 2) { alert('Минимум 2 символа'); return; }
            window.playerName = name;
            window.saveAll();
            window.showWindow('faction');
        };

        window.devReset = function() {
            if (confirm('СБРОСИТЬ ВСЕ ДАННЫЕ?')) { localStorage.clear(); location.reload(); }
        };

        window.selectFaction = function(name, color, bonus) {
            window.tempFaction = name; window.tempFactionColor = color; window.tempFactionBonus = bonus;
            window.tempShipIndex = null;
            const container = document.getElementById('ship-selection');
            container.innerHTML = '';
            ships[name].forEach((ship, i) => {
                const card = document.createElement('div');
                card.style.cssText = 'font-size:40px; cursor:pointer; padding:10px; border:2px solid #00ff00; text-align:center;';
                card.innerHTML = `${ship.emoji}<br><small style="font-size:7px;">${ship.name}</small>`;
                card.onclick = () => {
                    window.tempShipIndex = i;
                    container.querySelectorAll('div').forEach(d => d.style.borderColor = '#00ff00');
                    card.style.borderColor = '#ffcc00';
                    document.getElementById('confirm-ship-btn').disabled = false;
                };
                container.appendChild(card);
            });
            document.getElementById('confirm-ship-btn').disabled = true;
            window.showWindow('ship');
        };

        window.confirmShip = function() {
            const name = document.getElementById('input-ship-name').value.trim();
            if (window.tempShipIndex === null || name.length < 2) { alert('Выберите корабль и введите имя'); return; }
            window.frac = window.tempFaction; window.fracColor = window.tempFactionColor;
            window.fracBonus = window.tempFactionBonus; window.selectedShipIndex = window.tempShipIndex;
            window.shipName = name;
            ['sd_frac','sd_color','sd_bonus','sd_ship_index','sd_ship_name'].forEach(k => localStorage.setItem(k, window[k.replace('sd_','')]));
            window.saveAll();
            window.showUI();
            window.showWindow('main');
            window.generateBackgroundObjects();
            window.updateLeaderboard();
        };

        window.switchTab = function(tab) {
            window.currentTab = tab;
            document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
            document.getElementById('nav-' + tab).classList.add('active');
            
            const bgObjects = document.querySelectorAll('.bg-object');
            bgObjects.forEach(obj => obj.style.display = tab === 'map' ? 'block' : 'none');
            
            const lootFeed = document.getElementById('loot-feed');
            lootFeed.style.display = tab === 'map' ? 'flex' : 'none';
            
            if (tab === 'map') {
                window.showWindow('main');
            } else if (tab === 'hangar') {
                window.showWindow('hangar');
                document.getElementById('hangar-ship').innerText = window.getShipEmoji();
                document.getElementById('hangar-ship-name').innerText = window.shipName;
                updateHangarResources();
                updateHangar();
            } else if (tab === 'pvp') {
                window.showWindow('pvp');
                document.getElementById('pvp-player-ship').innerText = window.getShipEmoji();
                window.updateLeaderboard();
            }
        };

        function updateHangarResources() {
            const items = [
                { icon: '🪙', key: 'coins', label: 'МОН' },
                { icon: '🛡️', key: 'shieldParts', label: 'ЩИТ' },
                { icon: '⚔️', key: 'weaponParts', label: 'ОРУД' },
                { icon: '⚡', key: 'speedParts', label: 'СКОР' },
                { icon: '🎯', key: 'critParts', label: 'КРИТ' },
                { icon: '💎', key: 'spice', label: 'СПС' }
            ];
            document.getElementById('hangar-resources').innerHTML = items.map(item => `
                <div class="resource-mini-item"><span class="mini-icon">${item.icon}</span><span>${item.label}</span><div class="mini-value">${window.resources[item.key]}</div></div>
            `).join('');
        }

        function updateHangar() {
            const types = [
                { key: 'shield', name: 'ЩИТЫ', icon: '🛡️', costKey: 'shieldParts' },
                { key: 'damage', name: 'ОРУДИЯ', icon: '⚔️', costKey: 'weaponParts' },
                { key: 'speed', name: 'СКОРОСТЬ', icon: '⚡', costKey: 'speedParts' },
                { key: 'crit', name: 'КРИТ/ДОДЖ', icon: '🎯', costKey: 'critParts' }
            ];
            document.getElementById('upgrades-list').innerHTML = types.map(t => {
                const cost = 5 * (window.upgrades[t.key] + 1);
                return `<div class="upgrade-row"><div class="upgrade-info"><div>${t.icon} ${t.name}</div><small>УР.${window.upgrades[t.key]} | ${cost} ${t.icon}</small></div><button class="upgrade-btn" onclick="window.buyUpgrade('${t.key}')" ${window.resources[t.costKey] >= cost ? '' : 'disabled'}>+</button></div>`;
            }).join('');
        }

        window.buyUpgrade = function(type) {
            const costKeys = { shield: 'shieldParts', damage: 'weaponParts', speed: 'speedParts', crit: 'critParts' };
            const cost = 5 * (window.upgrades[type] + 1);
            if (window.resources[costKeys[type]] >= cost) {
                window.resources[costKeys[type]] -= cost;
                window.upgrades[type]++;
                localStorage.setItem('sd_upg_' + type, window.upgrades[type]);
                window.saveAll();
                updateHangarResources();
                updateHangar();
            }
        };

        window.searchPvP = function() {
            if (window.pvpInterval) return;
            const stats = { shield: 10 + window.upgrades.shield * 2, damage: 5 + window.upgrades.damage, attackSpeed: 1500 - window.upgrades.speed * 200, critDodge: 5 + window.upgrades.crit * 2 };
            if (window.fracBonus === 'shield') stats.shield = Math.floor(stats.shield * 1.5);
            if (window.fracBonus === 'weapon') stats.damage = Math.floor(stats.damage * 1.5);
            
            let pHP = stats.shield, eHP = 8 + Math.floor(Math.random() * 12), timeLeft = 15;
            document.getElementById('pvp-timer').innerText = timeLeft;
            document.getElementById('pvp-enemy-ship').innerText = ['🚀','🛸','💫','⚡','🛰️'][Math.floor(Math.random()*5)];
            
            window.pvpTimerInterval = setInterval(() => { timeLeft--; document.getElementById('pvp-timer').innerText = timeLeft; if(timeLeft<=0) endPvP(pHP,eHP); }, 1000);
            window.pvpInterval = setInterval(() => {
                let dmg = Math.floor(Math.random()*stats.damage)+1;
                if(Math.random()*100 < stats.critDodge) dmg *= 2;
                eHP -= dmg;
                document.getElementById('pvp-enemy-hp-text').innerText = 'HP:'+Math.max(0,eHP);
                if(eHP<=0) { endPvP(pHP,0); return; }
                setTimeout(() => {
                    if(eHP<=0) return;
                    let eDmg = Math.floor(Math.random()*5)+2;
                    if(Math.random()*100 < stats.critDodge) document.getElementById('pvp-status').innerText = 'ДОДЖ!';
                    else { pHP -= eDmg; document.getElementById('pvp-player-hp-text').innerText = 'HP:'+Math.max(0,pHP); }
                    if(pHP<=0) endPvP(0,eHP);
                }, 500);
            }, Math.max(stats.attackSpeed, 500));
        };

        function endPvP(pHP, eHP) {
            clearInterval(window.pvpInterval); clearInterval(window.pvpTimerInterval);
            window.pvpInterval = null; window.pvpTimerInterval = null;
            let result;
            if(pHP<=0 && eHP<=0) { result = 'НИЧЬЯ! +2'; window.pvpScore += 2; }
            else if(eHP<=0) { result = 'ПОБЕДА! +15'; window.pvpScore += 15; }
            else if(pHP<=0) { result = 'ПОРАЖЕНИЕ... -12'; window.pvpScore = Math.max(0, window.pvpScore-12); }
            else { result = 'НИЧЬЯ! +2'; window.pvpScore += 2; }
            document.getElementById('pvp-status').innerText = result;
            document.getElementById('pvp-timer').innerText = '0';
            window.updateLeaderboard();
            window.saveAll();
        }

        window.updateLeaderboard = function() {
            const idx = window.leaderboard.findIndex(p => p.name === window.playerName);
            if(idx >= 0) window.leaderboard[idx].score = window.pvpScore;
            else if(window.playerName) window.leaderboard.push({ name: window.playerName, score: window.pvpScore });
            window.leaderboard.sort((a,b) => b.score - a.score);
            window.leaderboard = window.leaderboard.slice(0, 15);
            document.getElementById('leaderboard').innerHTML = '<div style="color:#ffcc00; margin-bottom:5px;">ТОП 15</div>' + window.leaderboard.map((p,i) => `<div class="leaderboard-item"><span class="rank">#${i+1}</span><span class="name">${p.name}</span><span class="score">${p.score}</span></div>`).join('');
            window.saveAll();
        };

        window.goBack = function() { if(window.currentTab !== 'map') window.switchTab('map'); };

        // ИНИЦИАЛИЗАЦИЯ
        if (window.Telegram?.WebApp) { try { window.Telegram.WebApp.expand(); } catch(e) {} }

        if (window.playerName && window.frac) {
            window.showUI();
            window.showWindow('main');
            window.generateBackgroundObjects();
            window.updateLeaderboard();
        } else if (window.playerName) {
            window.showWindow('faction');
        } else {
            window.showWindow('start');
        }
    </script>
</body>
</html>
