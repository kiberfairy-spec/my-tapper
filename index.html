<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Space Dream</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap');
        
        * {
            image-rendering: auto;
            -ms-interpolation-mode: nearest-neighbor;
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        html, body { 
            background: #000000;
            color: #00ff00; 
            font-family: 'Press Start 2P', monospace; 
            user-select: none; 
            -webkit-user-select: none;
            overflow: hidden;
            height: 100vh;
            height: 100dvh;
            width: 100vw;
            width: 100dvw;
            position: fixed;
            -webkit-font-smoothing: antialiased;
        }
        
        .stars-layer {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 0;
            background: radial-gradient(ellipse at 50% 50%, #020410 0%, #000008 50%, #000000 100%);
        }
        
        .star {
            position: absolute;
            background: #ffffff;
            border-radius: 50%;
            animation: twinkle var(--duration) infinite;
            animation-delay: var(--delay);
        }
        
        .star.bright { background: #ccddff; box-shadow: 0 0 3px #8899cc; }
        .star.medium { background: #8899bb; }
        .star.dim { background: #556677; }
        .star.tiny { background: #334455; }
        
        .shooting-star {
            position: absolute;
            width: 1px;
            height: 60px;
            background: linear-gradient(to bottom, rgba(200,220,255,0.9), transparent);
            animation: shoot var(--travel) linear infinite;
            animation-delay: var(--sdelay);
            opacity: 0;
        }
        
        .nebula-cloud {
            position: absolute;
            border-radius: 50%;
            pointer-events: none;
            animation: nebulaPulse var(--npulse) infinite alternate;
        }
        
        @keyframes twinkle {
            0%, 100% { opacity: 0.1; transform: scale(0.8); }
            50% { opacity: 0.9; transform: scale(1.3); }
        }
        
        @keyframes shoot {
            0% { transform: translate(0, 0) rotate(-30deg); opacity: 0; }
            2% { opacity: 1; }
            10% { opacity: 0; transform: translate(-300px, 300px) rotate(-30deg); }
            100% { opacity: 0; transform: translate(-300px, 300px) rotate(-30deg); }
        }
        
        @keyframes nebulaPulse {
            0% { opacity: 0.03; transform: scale(1); }
            100% { opacity: 0.08; transform: scale(1.2); }
        }
        
        @keyframes rotate {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }
        
        @keyframes orbitAnim {
            from { transform: rotate(0deg) translateX(100px) rotate(0deg); }
            to { transform: rotate(360deg) translateX(100px) rotate(-360deg); }
        }
        
        @keyframes slideUp {
            from { transform: translateY(100%); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }
        
        @keyframes lootPopup {
            0% { opacity: 0; transform: translate(-50%, 0); }
            20% { opacity: 1; transform: translate(-50%, -35px); }
            100% { opacity: 0; transform: translate(-50%, -90px); }
        }
        
        @keyframes engineGlow {
            from { filter: drop-shadow(0 0 4px #5588bb); }
            to { filter: drop-shadow(0 0 10px #77aadd); }
        }
        
        @keyframes beamPulse {
            0%, 100% { opacity: 0.6; }
            50% { opacity: 1; }
        }
        
        @keyframes shipHover {
            0%, 100% { transform: translate(-50%, -50%) scale(0.5); }
            50% { transform: translate(-50%, calc(-50% - 3px)) scale(0.5); }
        }

        .app-container {
            position: relative;
            width: 100%;
            height: 100vh;
            height: 100dvh;
            display: flex;
            flex-direction: column;
        }

        .background-map {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: calc(100% - 80px);
            height: calc(100dvh - 80px);
            z-index: 1;
            pointer-events: none;
        }

        .galaxy-bg {
            position: relative;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background: transparent;
        }

        .planet-container {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: 2;
        }

        .pixel-planet {
            width: 130px;
            height: 130px;
            position: relative;
            animation: rotate 60s linear infinite;
        }
        
        .pixel-planet-inner {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            background: radial-gradient(circle at 32% 32%, #667788 0%, #445566 12%, #223344 28%, #111a28 50%, #080d15 70%, #030508 88%, #010203 100%);
            box-shadow: 0 0 25px rgba(70, 90, 120, 0.2), 0 0 50px rgba(50, 70, 100, 0.08), inset 0 -12px 24px rgba(0, 0, 0, 0.7);
            border: 1px solid #1a2530;
            position: relative;
            overflow: hidden;
        }
        
        .pixel-planet-inner::before {
            content: '';
            position: absolute;
            top: 4%;
            left: 16%;
            width: 40%;
            height: 20%;
            background: rgba(150, 170, 200, 0.05);
            border-radius: 50%;
            transform: rotate(-10deg);
        }
        
        .planet-atmosphere {
            position: absolute;
            top: -8px;
            left: -8px;
            width: 146px;
            height: 146px;
            border-radius: 50%;
            border: 2px solid rgba(80, 100, 130, 0.08);
        }
        
        .pixel-ring {
            position: absolute;
            top: -18px;
            left: -18px;
            width: 166px;
            height: 166px;
            border: 2px solid rgba(90, 110, 150, 0.12);
            border-radius: 50%;
            border-top-color: transparent;
            border-right-color: transparent;
            animation: rotate 18s linear infinite reverse;
        }

        .player-orbit {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: 5;
            pointer-events: none;
        }
        
        .player-on-orbit {
            position: absolute;
            animation: orbitAnim 22s linear infinite;
        }

        /* КОРАБЛЬ ИГРОКА - ДИЗАЙН STAR TREK */
        .pixel-player-ship {
            width: 38px;
            height: 44px;
            position: relative;
            animation: engineGlow 2s infinite alternate;
        }
        
        .ship-saucer {
            width: 55%;
            height: 22%;
            background: linear-gradient(180deg, #8899aa 0%, #667788 40%, #445566 100%);
            position: absolute;
            top: 10%;
            left: 22%;
            border-radius: 50% 50% 40% 40%;
            border: 1px solid #556677;
            box-shadow: inset 0 2px 3px rgba(150,170,190,0.2);
        }
        
        .ship-saucer::after {
            content: '';
            position: absolute;
            top: 20%;
            left: 15%;
            width: 70%;
            height: 30%;
            background: rgba(180,200,220,0.15);
            border-radius: 50%;
        }
        
        .ship-neck {
            width: 16%;
            height: 18%;
            background: linear-gradient(180deg, #667788, #445566);
            position: absolute;
            top: 30%;
            left: 42%;
            border-left: 1px solid #556677;
            border-right: 1px solid #556677;
        }
        
        .ship-body {
            width: 38%;
            height: 35%;
            background: linear-gradient(180deg, #778899 0%, #556678 40%, #334455 100%);
            position: absolute;
            top: 46%;
            left: 31%;
            border-radius: 8px 8px 4px 4px;
            border: 1px solid #445566;
        }
        
        .ship-nacelle-l {
            width: 12%;
            height: 40%;
            background: linear-gradient(90deg, #667788, #445566);
            position: absolute;
            top: 40%;
            left: 16%;
            border-radius: 50% 50% 30% 30%;
            border: 1px solid #3a4a5a;
        }
        
        .ship-nacelle-r {
            width: 12%;
            height: 40%;
            background: linear-gradient(90deg, #667788, #445566);
            position: absolute;
            top: 40%;
            right: 16%;
            border-radius: 50% 50% 30% 30%;
            border: 1px solid #3a4a5a;
        }
        
        .ship-nacelle-glow-l {
            position: absolute;
            bottom: 0;
            left: 17%;
            width: 10%;
            height: 6px;
            background: #6699cc;
            border-radius: 50%;
            filter: blur(2px);
        }
        
        .ship-nacelle-glow-r {
            position: absolute;
            bottom: 0;
            right: 17%;
            width: 10%;
            height: 6px;
            background: #6699cc;
            border-radius: 50%;
            filter: blur(2px);
        }
        
        .ship-impulse {
            position: absolute;
            bottom: 2px;
            left: 38%;
            width: 24%;
            height: 5px;
            background: #5588aa;
            border-radius: 50%;
            filter: blur(1px);
        }

        /* АСТЕРОИДЫ - БОЛЬШИЕ */
        .pixel-asteroid {
            position: relative;
        }
        
        .ast-body {
            border: 1px solid #1a120a;
            border-radius: 40% 45% 38% 42%;
            position: relative;
            overflow: hidden;
        }
        
        .pixel-asteroid.type1 .ast-body {
            width: 36px;
            height: 32px;
            background: linear-gradient(135deg, #5a4835 0%, #3a2818 30%, #251810 55%, #0d0703 100%);
            transform: rotate(-15deg);
        }
        
        .pixel-asteroid.type2 .ast-body {
            width: 40px;
            height: 34px;
            background: linear-gradient(135deg, #4a3828 0%, #2a180a 35%, #150a04 60%, #050200 100%);
            transform: rotate(10deg);
            border-radius: 42% 38% 45% 40%;
        }
        
        .pixel-asteroid.type3 .ast-body {
            width: 38px;
            height: 36px;
            background: linear-gradient(135deg, #6a5845 0%, #4a3828 30%, #2a180a 55%, #0a0502 100%);
            transform: rotate(-8deg);
            border-radius: 38% 44% 40% 46%;
        }
        
        .ast-crater {
            position: absolute;
            background: rgba(0, 0, 0, 0.55);
            border-radius: 50%;
            border: 1px solid rgba(0,0,0,0.2);
        }
        
        .ast-ridge {
            position: absolute;
            background: rgba(255, 255, 255, 0.04);
            border-radius: 30%;
        }

        /* ПИРАТЫ - ДИЗАЙН STAR WARS (TIE Fighter стиль) */
        .pixel-pirate {
            position: relative;
            filter: drop-shadow(0 0 5px rgba(200, 40, 40, 0.3));
        }
        
        .pir-body {
            position: relative;
        }
        
        .pixel-pirate.type1 .pir-body {
            width: 32px;
            height: 28px;
            background: radial-gradient(circle at 50% 50%, #553333, #221111);
            border-radius: 45%;
            border: 1px solid #441111;
        }
        
        .pixel-pirate.type1 .pir-wing-l {
            position: absolute;
            top: 2px;
            left: -10px;
            width: 10px;
            height: 24px;
            background: linear-gradient(90deg, #332222, #554444);
            clip-path: polygon(100% 0%, 100% 100%, 20% 80%, 0% 50%, 20% 20%);
            border: 1px solid #331111;
        }
        
        .pixel-pirate.type1 .pir-wing-r {
            position: absolute;
            top: 2px;
            right: -10px;
            width: 10px;
            height: 24px;
            background: linear-gradient(90deg, #554444, #332222);
            clip-path: polygon(0% 0%, 0% 100%, 80% 80%, 100% 50%, 80% 20%);
            border: 1px solid #331111;
        }
        
        .pixel-pirate.type2 .pir-body {
            width: 30px;
            height: 30px;
            background: radial-gradient(circle at 50% 50%, #664444, #331111);
            border-radius: 50%;
            border: 1px solid #551111;
        }
        
        .pixel-pirate.type2 .pir-wing-l {
            position: absolute;
            top: 4px;
            left: -12px;
            width: 12px;
            height: 22px;
            background: #443333;
            clip-path: polygon(100% 10%, 100% 90%, 30% 100%, 0% 50%, 30% 0%);
            border: 1px solid #331111;
        }
        
        .pixel-pirate.type2 .pir-wing-r {
            position: absolute;
            top: 4px;
            right: -12px;
            width: 12px;
            height: 22px;
            background: #443333;
            clip-path: polygon(0% 10%, 0% 90%, 70% 100%, 100% 50%, 70% 0%);
            border: 1px solid #331111;
        }
        
        .pixel-pirate.type3 .pir-body {
            width: 34px;
            height: 26px;
            background: radial-gradient(ellipse at 50% 50%, #774444, #441111);
            border-radius: 50%;
            border: 1px solid #661111;
        }
        
        .pixel-pirate.type3 .pir-wing-l {
            position: absolute;
            top: 0;
            left: -8px;
            width: 8px;
            height: 26px;
            background: #443333;
            clip-path: polygon(100% 0%, 100% 100%, 40% 85%, 20% 50%, 40% 15%);
            border: 1px solid #331111;
        }
        
        .pixel-pirate.type3 .pir-wing-r {
            position: absolute;
            top: 0;
            right: -8px;
            width: 8px;
            height: 26px;
            background: #443333;
            clip-path: polygon(0% 0%, 0% 100%, 60% 85%, 80% 50%, 60% 15%);
            border: 1px solid #331111;
        }
        
        .pir-cockpit {
            position: absolute;
            background: #557788;
            border-radius: 40%;
            border: 1px solid #334455;
            box-shadow: inset 0 0 2px rgba(130,170,200,0.3);
        }

        .bg-object {
            position: absolute;
            z-index: 2;
            pointer-events: none;
            transition: opacity 0.3s;
            transform: translate(-50%, -50%);
        }

        .flying-ship-anim {
            position: absolute;
            z-index: 10;
            pointer-events: none;
        }
        
        .ship-hovering {
            animation: shipHover 2s ease-in-out infinite;
        }

        .mining-beam {
            position: absolute;
            height: 1px;
            background: #44ff66;
            transform-origin: 0 0;
            z-index: 8;
            pointer-events: none;
            animation: beamPulse 0.8s infinite;
        }
        
        .battle-beam {
            position: absolute;
            height: 1px;
            background: #ff3333;
            transform-origin: 0 0;
            z-index: 8;
            pointer-events: none;
            animation: beamPulse 0.6s infinite;
        }

        .loot-popup {
            position: absolute;
            font-family: 'Press Start 2P', monospace;
            font-size: 7px;
            font-weight: bold;
            pointer-events: none;
            z-index: 15;
            animation: lootPopup 2.5s ease-out forwards;
            white-space: nowrap;
            color: #ccaa22;
        }

        .top-panel {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            height: 50px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 5px 10px;
            z-index: 100;
            pointer-events: none;
        }

        .back-btn {
            width: 34px;
            height: 34px;
            background: rgba(0, 20, 0, 0.9);
            border: 2px solid #00aa44;
            color: #00dd55;
            font-size: 15px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Press Start 2P', monospace;
            pointer-events: all;
            transition: all 0.2s;
        }
        .back-btn:hover { background: rgba(0, 35, 0, 0.9); }

        .spice-counter {
            background: rgba(0, 0, 0, 0.85);
            border: 2px solid #bb9922;
            color: #bb9922;
            padding: 5px 8px;
            font-size: 8px;
            pointer-events: all;
            text-align: center;
        }

        .dev-reset-btn {
            position: fixed;
            bottom: 88px;
            right: 8px;
            width: 22px;
            height: 22px;
            background: rgba(40, 0, 0, 0.7);
            border: 1px solid #aa3333;
            color: #aa3333;
            font-size: 8px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Press Start 2P', monospace;
            z-index: 200;
            pointer-events: all;
            border-radius: 50%;
        }

        .loot-feed {
            position: fixed;
            bottom: 85px;
            left: 8px;
            right: 8px;
            z-index: 90;
            pointer-events: none;
            text-align: center;
            min-height: 26px;
            display: none;
            align-items: center;
            justify-content: center;
            gap: 6px;
            flex-wrap: wrap;
        }
        .loot-item {
            font-family: 'Press Start 2P', monospace;
            font-size: 7px;
            color: #bb9922;
            animation: fadeInOut 3s ease-in-out forwards;
            background: rgba(0,0,0,0.6);
            padding: 2px 5px;
        }
        @keyframes fadeInOut {
            0% { opacity: 0; transform: translateY(5px); }
            20% { opacity: 1; transform: translateY(0); }
            80% { opacity: 1; }
            100% { opacity: 0; transform: translateY(-5px); }
        }

        .content-overlay {
            position: fixed;
            top: 50px;
            left: 0;
            right: 0;
            bottom: 80px;
            z-index: 50;
            pointer-events: none;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .content-overlay > * { pointer-events: all; }

        .bottom-panel {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            height: 80px;
            background: rgba(2, 2, 10, 0.96);
            border-top: 2px solid #009944;
            display: flex;
            justify-content: space-around;
            align-items: center;
            z-index: 100;
            padding: 4px;
        }
        .nav-btn {
            background: #040c04;
            border: 2px solid #006633;
            color: #00aa44;
            padding: 5px 8px;
            font-family: 'Press Start 2P', monospace;
            font-size: 6px;
            cursor: pointer;
            transition: all 0.2s;
            text-align: center;
            flex: 1;
            margin: 0 2px;
            max-width: 90px;
        }
        .nav-btn:hover { background: #061206; }
        .nav-btn.active { background: #061806; border-color: #bb9922; }
        .nav-btn .nav-icon { font-size: 13px; display: block; margin-bottom: 1px; }

        .window {
            background: rgba(2, 2, 14, 0.94);
            border: 2px solid #009944;
            padding: 14px;
            max-width: 300px;
            width: 88%;
            max-height: 50vh;
            overflow-y: auto;
            animation: slideUp 0.3s ease-out;
        }
        .input-field {
            width: 100%;
            padding: 8px;
            margin: 6px 0;
            background: #040410;
            border: 2px solid #009944;
            color: #00bb44;
            font-family: 'Press Start 2P', monospace;
            font-size: 8px;
            text-align: center;
        }
        .btn {
            width: 100%;
            padding: 8px;
            margin: 5px 0;
            background: #040c04;
            border: 2px solid #009944;
            color: #00bb44;
            font-family: 'Press Start 2P', monospace;
            font-size: 8px;
            cursor: pointer;
            transition: all 0.2s;
        }
        .btn:hover { background: #061206; }
        .btn:disabled { background: #161616; color: #333; border-color: #333; cursor: not-allowed; }
        .title { font-size: 11px; color: #00aa44; margin-bottom: 10px; text-align: center; }
        .pvp-arena-mini {
            background: rgba(0,0,0,0.5); border: 2px solid #aa3333;
            padding: 10px; height: 110px; position: relative;
            display: flex; align-items: center; justify-content: space-around;
        }
        .pvp-vs { font-size: 11px; color: #aa3333; }
        .pvp-hp { font-size: 6px; color: #aa3333; position: absolute; top: 3px; }
        .leaderboard {
            background: rgba(0,0,0,0.3); border: 1px solid #009944;
            padding: 6px; max-height: 140px; overflow-y: auto;
            font-size: 6px; text-align: left;
        }
        .leaderboard-item { display: flex; justify-content: space-between; padding: 2px 0; border-bottom: 1px solid rgba(0,180,50,0.1); }
        .leaderboard-item .rank { color: #bb9922; width: 22px; }
        .leaderboard-item .name { flex: 1; color: #00aa44; }
        .leaderboard-item .score { color: #448899; width: 40px; text-align: right; }
        .resources-mini {
            display: flex; justify-content: space-around; flex-wrap: wrap;
            gap: 3px; margin: 6px 0; padding: 5px;
            background: rgba(0,0,0,0.3); border: 1px solid #009944;
        }
        .resource-mini-item { text-align: center; font-size: 5px; color: #006633; }
        .resource-mini-item .mini-icon { font-size: 10px; display: block; }
        .resource-mini-item .mini-value { color: #bb9922; font-size: 6px; }
        .upgrade-row {
            display: flex; justify-content: space-between; align-items: center;
            padding: 5px; margin: 3px 0;
            background: rgba(0,0,0,0.3); border: 1px solid #009944;
        }
        .upgrade-info { font-size: 6px; text-align: left; }
        .upgrade-btn {
            background: #040c04; color: #00aa44; border: 1px solid #009944;
            padding: 3px 6px; font-family: 'Press Start 2P', monospace;
            font-size: 5px; cursor: pointer;
        }
        .upgrade-btn:disabled { background: #161616; color: #333; border-color: #333; cursor: not-allowed; }
        .hidden { display: none !important; }
    </style>
</head>
<body>
    <div class="stars-layer" id="stars-layer"></div>
    <div class="app-container">
        <div class="background-map" id="background-map">
            <div class="galaxy-bg" id="galaxy-bg">
                <div class="planet-container" id="planet-container">
                    <div class="pixel-planet">
                        <div class="planet-atmosphere"></div>
                        <div class="pixel-ring"></div>
                        <div class="pixel-planet-inner"></div>
                    </div>
                </div>
                <div class="player-orbit" id="player-orbit">
                    <div class="player-on-orbit" id="player-on-orbit"></div>
                </div>
            </div>
        </div>
        <div class="top-panel">
            <button class="back-btn hidden" id="back-btn" onclick="goBack()">←</button>
            <div></div>
            <div class="spice-counter hidden" id="spice-counter">◇ СПАЙС<br><span id="spice-value">0</span>/50</div>
        </div>
        <button class="dev-reset-btn hidden" id="dev-reset-btn" onclick="devReset()">↺</button>
        <div class="loot-feed" id="loot-feed"></div>
        <div class="content-overlay" id="content-overlay">
            <div class="window" id="window-start">
                <div class="title">SPACE DREAM</div>
                <input type="text" class="input-field" id="input-player-name" placeholder="ИМЯ ИГРОКА" maxlength="12">
                <button class="btn" onclick="setPlayerName()">ДАЛЕЕ</button>
            </div>
            <div class="window hidden" id="window-faction">
                <div class="title">ВЫБЕРИ ФРАКЦИЮ</div>
                <div class="btn" style="border-color:#4488aa;color:#4488aa" onclick="selectFaction('Конфедерация','#4488aa','shield')">◆ КОНФЕДЕРАЦИЯ<br><small>Щит +50%</small></div>
                <div class="btn" style="border-color:#aa5533;color:#aa5533" onclick="selectFaction('Повстанцы','#aa5533','weapon')">◆ ПОВСТАНЦЫ<br><small>Урон +50%</small></div>
                <div class="btn" style="border-color:#aa9933;color:#aa9933" onclick="selectFaction('Торговая гильдия','#aa9933','mining')">◆ ТОРГОВАЯ ГИЛЬДИЯ<br><small>Добыча +50%</small></div>
            </div>
            <div class="window hidden" id="window-ship">
                <div class="title">ВЫБЕРИ КОРАБЛЬ</div>
                <div id="ship-selection" style="display:flex;gap:8px;justify-content:center;margin:10px 0"></div>
                <input type="text" class="input-field" id="input-ship-name" placeholder="ИМЯ КОРАБЛЯ" maxlength="14">
                <button class="btn" id="confirm-ship-btn" onclick="confirmShip()">ПОДТВЕРДИТЬ</button>
            </div>
            <div class="window hidden" id="window-hangar">
                <div class="title">АНГАР</div>
                <div id="hangar-ship" style="text-align:center;margin:6px 0"></div>
                <div style="font-size:8px;text-align:center;margin-bottom:3px" id="hangar-ship-name"></div>
                <div class="resources-mini" id="hangar-resources"></div>
                <div id="upgrades-list"></div>
            </div>
            <div class="window hidden" id="window-pvp">
                <div class="title">PvP АРЕНА</div>
                <div class="pvp-arena-mini">
                    <span id="pvp-player-ship"></span>
                    <span class="pvp-vs">VS</span>
                    <span id="pvp-enemy-ship"></span>
                    <span class="pvp-hp" style="left:6px" id="pvp-player-hp-text">HP:100</span>
                    <span class="pvp-hp" style="right:6px" id="pvp-enemy-hp-text">HP:100</span>
                </div>
                <div style="text-align:center;font-size:8px;color:#aa9933" id="pvp-timer">15</div>
                <div style="text-align:center;font-size:6px" id="pvp-status">Нажмите НАЙТИ БОЙ</div>
                <button class="btn" onclick="searchPvP()">НАЙТИ БОЙ</button>
                <div class="leaderboard" id="leaderboard"><div style="color:#aa9933;margin-bottom:3px">ТОП 15</div></div>
            </div>
        </div>
        <div class="bottom-panel hidden" id="bottom-panel">
            <button class="nav-btn active" id="nav-map" onclick="switchTab('map')"><span class="nav-icon">◈</span>КАРТА</button>
            <button class="nav-btn" id="nav-hangar" onclick="switchTab('hangar')"><span class="nav-icon">▣</span>АНГАР</button>
            <button class="nav-btn" id="nav-pvp" onclick="switchTab('pvp')"><span class="nav-icon">◉</span>PvP</button>
        </div>
    </div>
    <script>
        window.playerName=localStorage.getItem('sd_player_name')||'';
        window.shipName=localStorage.getItem('sd_ship_name')||'';
        window.frac=localStorage.getItem('sd_frac')||null;
        window.fracColor=localStorage.getItem('sd_color')||'#00aa44';
        window.fracBonus=localStorage.getItem('sd_bonus')||null;
        window.selectedShipIndex=parseInt(localStorage.getItem('sd_ship_index'))||0;
        window.resources={coins:parseInt(localStorage.getItem('sd_coins'))||0,shieldParts:parseInt(localStorage.getItem('sd_shield'))||0,weaponParts:parseInt(localStorage.getItem('sd_weapon'))||0,speedParts:parseInt(localStorage.getItem('sd_speed'))||0,critParts:parseInt(localStorage.getItem('sd_crit'))||0,spice:parseInt(localStorage.getItem('sd_spice'))||0};
        window.spiceData=JSON.parse(localStorage.getItem('sd_spice_data'))||{date:'',collected:0};
        const today=new Date().toDateString();
        if(window.spiceData.date!==today){window.spiceData={date:today,collected:0};localStorage.setItem('sd_spice_data',JSON.stringify(window.spiceData))}
        window.pvpScore=parseInt(localStorage.getItem('sd_pvp_score'))||0;
        window.leaderboard=JSON.parse(localStorage.getItem('sd_leaderboard'))||[];
        window.upgrades={shield:parseInt(localStorage.getItem('sd_upg_shield'))||1,damage:parseInt(localStorage.getItem('sd_upg_damage'))||0,speed:parseInt(localStorage.getItem('sd_upg_speed'))||0,crit:parseInt(localStorage.getItem('sd_upg_crit'))||0};
        window.galaxyObjects=[];window.isShipFlying=false;window.pvpInterval=null;window.pvpTimerInterval=null;window.currentTab='map';
        window.tempFaction=null;window.tempFactionColor=null;window.tempFactionBonus=null;window.tempShipIndex=null;
        const lootNames={coins:'◆ МОН',shieldParts:'◈ ЩИТ',weaponParts:'▣ ОРУД',speedParts:'◉ СКОР',critParts:'◎ КРИТ',spice:'◇ СПС'};
        window.saveAll=function(){Object.keys(window.resources).forEach(k=>localStorage.setItem('sd_'+k,window.resources[k]));localStorage.setItem('sd_spice_data',JSON.stringify(window.spiceData));localStorage.setItem('sd_pvp_score',window.pvpScore);localStorage.setItem('sd_leaderboard',JSON.stringify(window.leaderboard));localStorage.setItem('sd_player_name',window.playerName);localStorage.setItem('sd_ship_name',window.shipName)};

        function createPixelShip(scale=1){const c=document.createElement('div');c.className='pixel-player-ship';c.style.transform=`scale(${scale})`;c.innerHTML='<div class="ship-saucer"></div><div class="ship-neck"></div><div class="ship-body"></div><div class="ship-nacelle-l"></div><div class="ship-nacelle-r"></div><div class="ship-nacelle-glow-l"></div><div class="ship-nacelle-glow-r"></div><div class="ship-impulse"></div>';return c}
        function createAsteroid(type){const c=document.createElement('div');c.className='pixel-asteroid type'+type;c.innerHTML=`<div class="ast-body"></div><div class="ast-crater" style="width:${5+type*2}px;height:${4+type*2}px;top:${15+type*4}%;left:${18+type*7}%"></div><div class="ast-crater" style="width:${3+type}px;height:${3+type}px;top:${40+type*3}%;right:${12+type*4}%"></div><div class="ast-ridge" style="width:${8+type*2}px;height:${3+type}px;top:${8+type*3}%;left:${10+type*5}%"></div>`;return c}
        function createPirate(type){const c=document.createElement('div');c.className='pixel-pirate type'+type;c.innerHTML=`<div class="pir-body"></div><div class="pir-wing-l"></div><div class="pir-wing-r"></div><div class="pir-cockpit" style="width:${10-type}px;height:${7-type}px;top:${30}%;left:${38}%;transform:translate(-50%,-50%)"></div>`;return c}

        window.showLoot=function(type){if(!type)return;const f=document.getElementById('loot-feed');const i=document.createElement('span');i.className='loot-item';i.innerText='+'+lootNames[type];f.appendChild(i);setTimeout(()=>i.remove(),3000)};
        window.showWindow=function(id){document.querySelectorAll('.window').forEach(w=>w.classList.add('hidden'));const w=document.getElementById('window-'+id);if(w)w.classList.remove('hidden')};
        window.showUI=function(){document.getElementById('back-btn').classList.remove('hidden');document.getElementById('spice-counter').classList.remove('hidden');document.getElementById('bottom-panel').classList.remove('hidden');document.getElementById('dev-reset-btn').classList.remove('hidden');document.getElementById('spice-value').innerText=window.spiceData.collected};

        // ЖИВОЙ ФОН
        function createBackground(){
            const layer=document.getElementById('stars-layer');
            // Туманности
            const nebulae=['#112244','#221133','#113322','#221122'];
            nebulae.forEach((color,i)=>{
                const neb=document.createElement('div');neb.className='nebula-cloud';
                neb.style.width=(100+Math.random()*180)+'px';neb.style.height=(60+Math.random()*120)+'px';
                neb.style.left=(5+Math.random()*80)+'%';neb.style.top=(5+Math.random()*80)+'%';
                neb.style.background=`radial-gradient(circle, ${color}33 0%, transparent 70%)`;
                neb.style.setProperty('--npulse',(8+Math.random()*12)+'s');
                layer.appendChild(neb);
            });
            // Звезды
            for(let i=0;i<500;i++){const s=document.createElement('div');s.className='star';const r=Math.random();
                if(r<0.1)s.classList.add('bright');
                else if(r<0.3)s.classList.add('medium');
                else if(r<0.6)s.classList.add('dim');
                else s.classList.add('tiny');
                s.style.left=Math.random()*100+'%';s.style.top=Math.random()*100+'%';
                const sz=Math.random()<0.06?2.5:(Math.random()<0.2?1.8:(Math.random()<0.5?1.2:0.6));
                s.style.width=sz+'px';s.style.height=sz+'px';
                s.style.setProperty('--duration',(Math.random()*3+1.5)+'s');
                s.style.setProperty('--delay',Math.random()*2+'s');layer.appendChild(s)
            }
            // Падающие звезды
            for(let i=0;i<6;i++){const s=document.createElement('div');s.className='shooting-star';
                s.style.left=Math.random()*85+'%';s.style.top=Math.random()*50+'%';
                s.style.setProperty('--travel',(Math.random()*4+3)+'s');
                s.style.setProperty('--sdelay',(Math.random()*7)+'s');layer.appendChild(s)
            }
        }
        createBackground();

        function getMapCenter(){const bg=document.getElementById('galaxy-bg');return{x:bg.offsetWidth/2,y:bg.offsetHeight/2}}
        function createOrbitShip(){const o=document.getElementById('player-on-orbit');o.innerHTML='';o.appendChild(createPixelShip(0.5));o.style.display='block'}

        window.generateBackgroundObjects=function(){
            const bg=document.getElementById('galaxy-bg');bg.querySelectorAll('.bg-object').forEach(e=>e.remove());window.galaxyObjects=[];
            const center=getMapCenter();const phi=(1+Math.sqrt(5))/2;
            const types=['asteroid','asteroid','asteroid','pirate','pirate','pirate'];
            const shuffled=types.sort(()=>Math.random()-0.5);
            const minDist=Math.min(center.x,center.y)*0.82;
            shuffled.forEach((type,i)=>{
                const angle=(i*phi*Math.PI*2)%(Math.PI*2);
                const distance=Math.min(minDist,150+(i*34));
                const x=center.x+Math.cos(angle)*distance;
                const y=center.y+Math.sin(angle)*distance;
                const obj={type:type==='asteroid'?'mining':'battle',x,y,element:null,subtype:Math.floor(Math.random()*3)+1};
                const div=document.createElement('div');div.className='bg-object';div.style.left=x+'px';div.style.top=y+'px';div.style.pointerEvents='all';div.style.cursor='pointer';
                if(type==='asteroid'){div.appendChild(createAsteroid(obj.subtype))}else{div.appendChild(createPirate(obj.subtype))}
                div.onclick=function(e){e.stopPropagation();if(window.currentTab==='map'&&!window.isShipFlying)window.flyToObject(obj,div)};
                bg.appendChild(div);obj.element=div;window.galaxyObjects.push(obj)
            })
        };

        window.addEventListener('resize',()=>{
            const c=getMapCenter();document.getElementById('planet-container').style.left=c.x+'px';document.getElementById('planet-container').style.top=c.y+'px';
            window.galaxyObjects.forEach((o,i)=>{const phi=(1+Math.sqrt(5))/2;const a=(i*phi*Math.PI*2)%(Math.PI*2);const d=Math.min(Math.min(c.x,c.y)*0.82,150+(i*34));o.x=c.x+Math.cos(a)*d;o.y=c.y+Math.sin(a)*d;if(o.element){o.element.style.left=o.x+'px';o.element.style.top=o.y+'px'}})
        });

        window.flyToObject=function(obj,element){
            if(window.isShipFlying)return;window.isShipFlying=true;
            const center=getMapCenter();const bg=document.getElementById('galaxy-bg');
            document.getElementById('player-on-orbit').style.display='none';
            // Остановка на расстоянии 4px от объекта
            const dx=obj.x-center.x;const dy=obj.y-center.y;const dist=Math.sqrt(dx*dx+dy*dy);
            const stopDist=dist-12;
            const stopX=center.x+(dx/dist)*stopDist;
            const stopY=center.y+(dy/dist)*stopDist;
            const shipW=document.createElement('div');shipW.className='flying-ship-anim';shipW.style.left=center.x+'px';shipW.style.top=center.y+'px';shipW.appendChild(createPixelShip(0.5));bg.appendChild(shipW);
            shipW.style.transition='all 4s cubic-bezier(0.25,0.1,0.25,1)';
            requestAnimationFrame(()=>{shipW.style.left=stopX+'px';shipW.style.top=stopY+'px';shipW.style.transform='translate(-50%,-50%) scale(0.5)'});
            setTimeout(()=>{
                shipW.classList.add('ship-hovering');
                // Луч от корабля к объекту
                const beam=document.createElement('div');
                beam.className=obj.type==='mining'?'mining-beam':'battle-beam';
                const updateBeam=()=>{
                    const sx=parseFloat(shipW.style.left);const sy=parseFloat(shipW.style.top);
                    const bdx=obj.x-sx;const bdy=obj.y-sy;const bdist=Math.sqrt(bdx*bdx+bdy*bdy);
                    beam.style.top=sy+'px';beam.style.left=sx+'px';beam.style.width=bdist+'px';
                    beam.style.transform=`rotate(${Math.atan2(bdy,bdx)}rad)`;
                };
                updateBeam();bg.appendChild(beam);
                const beamInterval=setInterval(updateBeam,80);
                const lootType=window.addLoot(window.getLoot());
                if(lootType){const popup=document.createElement('div');popup.className='loot-popup';popup.style.left=obj.x+'px';popup.style.top=(obj.y-35)+'px';popup.innerText='+'+lootNames[lootType];bg.appendChild(popup);setTimeout(()=>popup.remove(),2500)}
                window.showLoot(lootType);
                element.style.opacity='0.2';
                setTimeout(()=>{
                    clearInterval(beamInterval);beam.remove();element.style.opacity='0';
                    shipW.classList.remove('ship-hovering');
                    shipW.style.transition='all 3s cubic-bezier(0.25,0.1,0.25,1)';
                    shipW.style.left=center.x+'px';shipW.style.top=center.y+'px';shipW.style.transform='translate(-50%,-50%) scale(0.5)';
                    setTimeout(()=>{shipW.remove();element.remove();window.galaxyObjects=window.galaxyObjects.filter(o=>o!==obj);window.isShipFlying=false;window.updateSpiceDisplay();createOrbitShip();if(document.querySelectorAll('.bg-object').length===0)window.generateBackgroundObjects()},3000)
                },5000)
            },4000)
        };

        window.getLoot=function(){const r=Math.random()*100;if(r<40)return null;if(r<60)return'coins';if(r<70)return'shieldParts';if(r<80)return'weaponParts';if(r<90)return'speedParts';if(r<97)return'critParts';return'spice'};
        window.addLoot=function(type){if(!type)return null;if(type==='spice'){if(window.spiceData.collected>=50)return null;window.spiceData.collected++;window.resources.spice++}else{const a={coins:Math.floor(Math.random()*16)+4,shieldParts:1,weaponParts:1,speedParts:1,critParts:1};window.resources[type]+=a[type]}window.saveAll();return type};
        window.updateSpiceDisplay=function(){document.getElementById('spice-value').innerText=window.spiceData.collected};
        window.setPlayerName=function(){const n=document.getElementById('input-player-name').value.trim();if(n.length<2){alert('Минимум 2 символа');return}window.playerName=n;window.saveAll();window.showWindow('faction')};
        window.devReset=function(){if(confirm('СБРОСИТЬ ВСЕ ДАННЫЕ?')){localStorage.clear();location.reload()}};
        window.selectFaction=function(name,color,bonus){window.tempFaction=name;window.tempFactionColor=color;window.tempFactionBonus=bonus;window.tempShipIndex=null;const c=document.getElementById('ship-selection');c.innerHTML='';for(let i=0;i<3;i++){const card=document.createElement('div');card.style.cssText='cursor:pointer;padding:6px;border:2px solid #009944;text-align:center;';card.appendChild(createPixelShip(0.7));card.onclick=()=>{window.tempShipIndex=i;c.querySelectorAll('div').forEach(d=>d.style.borderColor='#009944');card.style.borderColor='#aa9933';document.getElementById('confirm-ship-btn').disabled=false};c.appendChild(card)}document.getElementById('confirm-ship-btn').disabled=true;window.showWindow('ship')};
        window.confirmShip=function(){const n=document.getElementById('input-ship-name').value.trim();if(window.tempShipIndex===null||n.length<2){alert('Выберите корабль и введите имя');return}window.frac=window.tempFaction;window.fracColor=window.tempFactionColor;window.fracBonus=window.tempFactionBonus;window.selectedShipIndex=window.tempShipIndex;window.shipName=n;['sd_frac','sd_color','sd_bonus','sd_ship_index','sd_ship_name'].forEach(k=>localStorage.setItem(k,window[k.replace('sd_','')]));window.saveAll();window.showUI();document.getElementById('content-overlay').style.display='none';const center=getMapCenter();document.getElementById('planet-container').style.left=center.x+'px';document.getElementById('planet-container').style.top=center.y+'px';createOrbitShip();window.generateBackgroundObjects();window.updateLeaderboard()};
        window.switchTab=function(tab){window.currentTab=tab;document.querySelectorAll('.nav-btn').forEach(b=>b.classList.remove('active'));document.getElementById('nav-'+tab).classList.add('active');document.querySelectorAll('.bg-object').forEach(o=>o.style.display=tab==='map'?'block':'none');document.getElementById('loot-feed').style.display=tab==='map'?'flex':'none';if(tab==='map'){document.getElementById('content-overlay').style.display='none'}else{document.getElementById('content-overlay').style.display='flex';if(tab==='hangar'){window.showWindow('hangar');const h=document.getElementById('hangar-ship');h.innerHTML='';h.appendChild(createPixelShip(1));document.getElementById('hangar-ship-name').innerText=window.shipName;updateHangarResources();updateHangar()}else if(tab==='pvp'){window.showWindow('pvp');const p=document.getElementById('pvp-player-ship');p.innerHTML='';p.appendChild(createPixelShip(0.65));window.updateLeaderboard()}}};
        function updateHangarResources(){const i=[{icon:'◆',key:'coins',label:'МОН'},{icon:'◈',key:'shieldParts',label:'ЩИТ'},{icon:'▣',key:'weaponParts',label:'ОРУД'},{icon:'◉',key:'speedParts',label:'СКОР'},{icon:'◎',key:'critParts',label:'КРИТ'},{icon:'◇',key:'spice',label:'СПС'}];document.getElementById('hangar-resources').innerHTML=i.map(t=>`<div class="resource-mini-item"><span class="mini-icon">${t.icon}</span><span>${t.label}</span><div class="mini-value">${window.resources[t.key]}</div></div>`).join('')}
        function updateHangar(){const t=[{key:'shield',name:'ЩИТЫ',icon:'◈',costKey:'shieldParts'},{key:'damage',name:'ОРУДИЯ',icon:'▣',costKey:'weaponParts'},{key:'speed',name:'СКОРОСТЬ',icon:'◉',costKey:'speedParts'},{key:'crit',name:'КРИТ/ДОДЖ',icon:'◎',costKey:'critParts'}];document.getElementById('upgrades-list').innerHTML=t.map(u=>{const c=5*(window.upgrades[u.key]+1);return`<div class="upgrade-row"><div class="upgrade-info"><div>${u.icon} ${u.name}</div><small>УР.${window.upgrades[u.key]} | ${c} ${u.icon}</small></div><button class="upgrade-btn" onclick="window.buyUpgrade('${u.key}')" ${window.resources[u.costKey]>=c?'':'disabled'}>+</button></div>`}).join('')}
        window.buyUpgrade=function(type){const ck={shield:'shieldParts',damage:'weaponParts',speed:'speedParts',crit:'critParts'};const c=5*(window.upgrades[type]+1);if(window.resources[ck[type]]>=c){window.resources[ck[type]]-=c;window.upgrades[type]++;localStorage.setItem('sd_upg_'+type,window.upgrades[type]);window.saveAll();updateHangarResources();updateHangar()}};
        window.searchPvP=function(){if(window.pvpInterval)return;const s={shield:10+window.upgrades.shield*2,damage:5+window.upgrades.damage,attackSpeed:1500-window.upgrades.speed*200,critDodge:5+window.upgrades.crit*2};if(window.fracBonus==='shield')s.shield=Math.floor(s.shield*1.5);if(window.fracBonus==='weapon')s.damage=Math.floor(s.damage*1.5);let pHP=s.shield,eHP=8+Math.floor(Math.random()*12),tL=15;document.getElementById('pvp-timer').innerText=tL;const eS=document.getElementById('pvp-enemy-ship');eS.innerHTML='';eS.appendChild(createPirate(Math.floor(Math.random()*3)+1));window.pvpTimerInterval=setInterval(()=>{tL--;document.getElementById('pvp-timer').innerText=tL;if(tL<=0)endPvP(pHP,eHP)},1000);window.pvpInterval=setInterval(()=>{let d=Math.floor(Math.random()*s.damage)+1;if(Math.random()*100<s.critDodge)d*=2;eHP-=d;document.getElementById('pvp-enemy-hp-text').innerText='HP:'+Math.max(0,eHP);if(eHP<=0){endPvP(pHP,0);return}setTimeout(()=>{if(eHP<=0)return;let eD=Math.floor(Math.random()*5)+2;if(Math.random()*100<s.critDodge)document.getElementById('pvp-status').innerText='УКЛОН!';else{pHP-=eD;document.getElementById('pvp-player-hp-text').innerText='HP:'+Math.max(0,pHP)}if(pHP<=0)endPvP(0,eHP)},500)},Math.max(s.attackSpeed,500))};
        function endPvP(pHP,eHP){clearInterval(window.pvpInterval);clearInterval(window.pvpTimerInterval);window.pvpInterval=null;window.pvpTimerInterval=null;let r;if(pHP<=0&&eHP<=0){r='НИЧЬЯ! +2';window.pvpScore+=2}else if(eHP<=0){r='ПОБЕДА! +15';window.pvpScore+=15}else if(pHP<=0){r='ПОРАЖЕНИЕ... -12';window.pvpScore=Math.max(0,window.pvpScore-12)}else{r='НИЧЬЯ! +2';window.pvpScore+=2}document.getElementById('pvp-status').innerText=r;document.getElementById('pvp-timer').innerText='0';window.updateLeaderboard();window.saveAll()}
        window.updateLeaderboard=function(){const i=window.leaderboard.findIndex(p=>p.name===window.playerName);if(i>=0)window.leaderboard[i].score=window.pvpScore;else if(window.playerName)window.leaderboard.push({name:window.playerName,score:window.pvpScore});window.leaderboard.sort((a,b)=>b.score-a.score);window.leaderboard=window.leaderboard.slice(0,15);document.getElementById('leaderboard').innerHTML='<div style="color:#aa9933;margin-bottom:3px">ТОП 15</div>'+window.leaderboard.map((p,i)=>`<div class="leaderboard-item"><span class="rank">#${i+1}</span><span class="name">${p.name}</span><span class="score">${p.score}</span></div>`).join('');window.saveAll()};
        window.goBack=function(){if(window.currentTab!=='map')window.switchTab('map')};
        if(window.Telegram?.WebApp){try{window.Telegram.WebApp.expand()}catch(e){}}
        if(window.playerName&&window.frac){window.showUI();document.getElementById('content-overlay').style.display='none';const c=getMapCenter();document.getElementById('planet-container').style.left=c.x+'px';document.getElementById('planet-container').style.top=c.y+'px';createOrbitShip();window.generateBackgroundObjects();window.updateLeaderboard()}else if(window.playerName){window.showWindow('faction')}else{window.showWindow('start')}
    </script>
</body>
</html>
