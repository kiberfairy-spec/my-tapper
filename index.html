<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Моя Первая Тапалка</title>
    <!-- Подключаем внутренние инструменты Telegram -->
    <script src="https://telegram.org"></script>
    <style>
        body {
            background-color: #1c1c1e;
            color: white;
            font-family: Arial, sans-serif;
            text-align: center;
            margin: 0;
            padding-top: 50px;
            user-select: none; /* Чтобы текст не выделялся при кликах */
        }
        .score-container {
            font-size: 28px;
            margin-bottom: 30px;
        }
        /* Стили для нашей большой круглой кнопки */
        #coin {
            width: 200px;
            height: 200px;
            background: linear-gradient(135deg, #ffcc00, #ff9900);
            border-radius: 50%;
            margin: 0 auto;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            font-weight: bold;
            color: #fff;
            box-shadow: 0 10px 20px rgba(0,0,0,0.3);
            cursor: pointer;
            transition: transform 0.05s;
        }
        #coin:active {
            transform: scale(0.95); /* Эффект нажатия */
        }
    </style>
</head>
<body>

    <div class="score-container">
        Монеты: <span id="balance">0</span>
    </div>

    <div id="coin">ТАПАЙ!</div>

    <script>
        // Инициализируем окно Telegram
        const tg = window.Telegram.WebApp;
        tg.expand(); // Открываем игру на весь экран смартфона

        let score = 0;
        const balanceEl = document.getElementById('balance');
        const coinEl = document.getElementById('coin');

        // Логика при клике на кнопку
        coinEl.addEventListener('click', () => {
            score++;
            balanceEl.innerText = score;

            // Включаем легкую вибрацию на телефоне, если это возможно
            if (tg.HapticFeedback) {
                tg.HapticFeedback.impactOccurred('light');
            }
        });
    </script>
</body>
</html>
